<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的溫柔紀錄空間</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mint: #d1f2eb; --blue: #d6eaf8; --text: #566573; --accent: #a3e4d7; }
        body { background: #fdfdfd; color: var(--text); font-family: sans-serif; padding-bottom: 80px; }
        .tab-active { color: #a3e4d7; border-bottom: 3px solid #a3e4d7; }
        .card { background: white; border-radius: 1.5rem; border: 1px solid #f0f0f0; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .date-item { min-width: 60px; transition: all 0.2s; }
        .date-active { background: var(--mint); border-radius: 1rem; color: #148f77; font-weight: bold; }
        .hidden { display: none; }
        /* 底部導覽 */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 bg-white z-50 shadow-sm">
        <div class="flex justify-between items-center mb-4">
            <button onclick="document.getElementById('date-picker').showPicker()" class="text-teal-400"><i class="fa-solid fa-calendar-alt text-xl"></i></button>
            <span class="font-bold text-teal-600">健康駕駛艙</span>
            <button onclick="toggleChart()" class="text-blue-400"><i class="fa-solid fa-chart-line text-xl"></i></button>
        </div>
        <div id="date-slider" class="flex justify-between overflow-x-auto px-2 space-x-2 no-scrollbar">
            </div>
    </header>

    <div id="tab-daily" class="p-4 space-y-4">
        <div class="card p-6 grid grid-cols-3 gap-2 text-center bg-gradient-to-br from-white to-[#f0f9f9]">
            <div><p class="text-[10px] text-gray-400">體重</p><p id="v-w" class="text-xl font-bold text-teal-500">--</p></div>
            <div><p class="text-[10px] text-gray-400">蛋白</p><p id="v-p" class="text-xl font-bold text-blue-400">0</p></div>
            <div><p class="text-[10px] text-gray-400">碳水</p><p id="v-c" class="text-xl font-bold text-orange-300">0</p></div>
        </div>

        <div class="card p-6 space-y-4">
            <div class="grid grid-cols-3 gap-2">
                <input id="i-w" type="number" step="0.1" class="border-b-2 border-mint p-2 text-center focus:outline-none" placeholder="體重">
                <input id="i-p" type="number" class="border-b-2 border-mint p-2 text-center focus:outline-none" placeholder="蛋白">
                <input id="i-c" type="number" class="border-b-2 border-mint p-2 text-center focus:outline-none" placeholder="碳水">
            </div>
            <textarea id="i-content" class="w-full bg-gray-50 rounded-xl p-3 text-sm focus:outline-none" rows="2" placeholder="進食紀錄..."></textarea>
            <button onclick="saveData()" class="w-full bg-[#a3e4d7] text-white py-3 rounded-xl font-bold shadow-sm">儲存今日數據</button>
        </div>

        <div class="card p-5">
            <h3 class="text-sm font-bold text-gray-400 mb-3">數據趨勢</h3>
            <div id="history-list" class="space-y-3">
                </div>
        </div>
    </div>

    <div id="tab-inbody" class="p-4 hidden">
        <div class="card p-6 text-center space-y-4">
            <h2 class="text-lg font-bold text-blue-500">InBody 數據分析</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-blue-50 p-4 rounded-2xl"><p class="text-xs text-blue-400">骨骼肌重</p><input type="number" class="w-full bg-transparent text-center font-bold" placeholder="0.0"></div>
                <div class="bg-pink-50 p-4 rounded-2xl"><p class="text-xs text-pink-400">體脂肪率</p><input type="number" class="w-full bg-transparent text-center font-bold" placeholder="0.0%"></div>
            </div>
            <p class="text-xs text-gray-400 italic text-left p-2">※ InBody 數據建議每月更新一次，觀察身體組成變化。</p>
            <button class="w-full bg-blue-300 text-white py-3 rounded-xl font-bold">儲存 InBody 紀錄</button>
        </div>
    </div>

    <div id="chart-modal" class="fixed inset-0 bg-white z-[200] p-6 hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-lg">數據折線圖</h2>
            <button onclick="toggleChart()" class="text-2xl">&times;</button>
        </div>
        <canvas id="weightChart"></canvas>
    </div>

    <nav class="bottom-nav">
        <button onclick="switchTab('daily')" id="btn-daily" class="tab-active flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px]">每日紀錄</span></button>
        <button onclick="switchTab('inbody')" id="btn-inbody" class="flex flex-col items-center text-gray-300"><i class="fa-solid fa-body-scan"></i><span class="text-[10px]">InBody</span></button>
    </nav>

    <input type="date" id="date-picker" class="hidden" onchange="setDate(this.value)">

    <script>
        let db = JSON.parse(localStorage.getItem('health_db') || '{}');
        let selectedDate = new Date().toISOString().split('T')[0];
        let chartInstance = null;

        function setDate(date) { selectedDate = date; updateUI(); }

        function switchTab(tab) {
            document.getElementById('tab-daily').classList.toggle('hidden', tab !== 'daily');
            document.getElementById('tab-inbody').classList.toggle('hidden', tab !== 'inbody');
            document.getElementById('btn-daily').classList.toggle('tab-active', tab === 'daily');
            document.getElementById('btn-inbody').classList.toggle('tab-active', tab === 'inbody');
        }

        function updateUI() {
            renderDateSlider();
            const data = db[selectedDate] || { w: '', p: '', c: '', content: '' };
            document.getElementById('v-w').innerText = data.w || '--';
            document.getElementById('v-p').innerText = data.p || '0';
            document.getElementById('v-c').innerText = data.c || '0';
            document.getElementById('i-w').value = data.w;
            document.getElementById('i-p').value = data.p;
            document.getElementById('i-c').value = data.c;
            document.getElementById('i-content').value = data.content || '';
            renderHistory();
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider');
            slider.innerHTML = '';
            for(let i = -2; i <= 2; i++) {
                let d = new Date(selectedDate);
                d.setDate(d.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let weight = db[dateStr]?.w || '--';
                let isActive = i === 0 ? 'date-active shadow-sm' : '';
                slider.innerHTML += `
                    <div onclick="setDate('${dateStr}')" class="date-item p-2 text-center cursor-pointer ${isActive}">
                        <div class="text-[10px] opacity-60">${d.getDate()}日</div>
                        <div class="text-xs">${weight}</div>
                    </div>`;
            }
        }

        function saveData() {
            db[selectedDate] = {
                w: document.getElementById('i-w').value,
                p: document.getElementById('i-p').value || 0,
                c: document.getElementById('i-c').value || 0,
                content: document.getElementById('i-content').value
            };
            localStorage.setItem('health_db', JSON.stringify(db));
            updateUI();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const dates = Object.keys(db).sort().reverse().slice(0, 7);
            dates.forEach(date => {
                const item = db[date];
                list.innerHTML += `
                    <div class="flex justify-between items-center text-sm border-b pb-2 last:border-0">
                        <span class="text-gray-400 font-medium">${date.substring(5)}</span>
                        <span class="font-bold text-gray-600">${item.w}kg</span>
                        <div class="text-[10px] space-x-1">
                            <span class="bg-blue-50 text-blue-400 px-2 py-1 rounded">P: ${item.p}</span>
                            <span class="bg-orange-50 text-orange-400 px-2 py-1 rounded">C: ${item.c}</span>
                        </div>
                    </div>`;
            });
        }

        function toggleChart() {
            const modal = document.getElementById('chart-modal');
            modal.classList.toggle('hidden');
            if(!modal.classList.contains('hidden')) renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            const dates = Object.keys(db).sort();
            const weights = dates.map(d => db[d].w);
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.substring(5)),
                    datasets: [{ label: '體重趨勢', data: weights, borderColor: '#a3e4d7', backgroundColor: 'rgba(163, 228, 215, 0.2)', fill: true, tension: 0.4 }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });
        }

        updateUI();
    </script>
</body>
</html>
