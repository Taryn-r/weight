<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的溫柔紀錄空間</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mint: #d1f2eb; --blue: #d6eaf8; --text: #566573; --accent: #a3e4d7; --bg-soft: #f0f9f9; }
        body { 
            background: linear-gradient(135deg, var(--bg-soft) 0%, #ffffff 100%);
            color: var(--text); 
            font-family: "PingFang TC", sans-serif; 
            padding-bottom: 90px;
            min-height: 100vh;
        }
        .macaron-card { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 2rem; 
            box-shadow: 0 8px 20px rgba(163, 228, 215, 0.2); 
        }
        .date-active { background: white; border-radius: 1.2rem; color: #148f77; font-weight: bold; border: 1.5px solid var(--mint); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-primary { background: linear-gradient(135deg, #a3e4d7 0%, #85c1e9 100%); color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; border-radius: 2rem 2rem 0 0; }
        .tab-active { color: #5dade2; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(214, 234, 248, 0.7); z-index: 200; backdrop-filter: blur(8px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 bg-white/70 backdrop-blur-md z-50">
        <div class="flex justify-between items-center mb-4 max-w-md mx-auto">
            <button onclick="document.getElementById('date-picker').showPicker()" class="text-teal-400 text-xl"><i class="fa-solid fa-calendar-alt"></i></button>
            <span class="font-bold text-teal-600 tracking-widest text-lg">健康紀錄表</span>
            <button onclick="toggleHistory()" class="text-blue-400 text-xl"><i class="fa-solid fa-table-list"></i></button>
        </div>
        <div id="date-slider" class="flex overflow-x-auto space-x-2 no-scrollbar max-w-md mx-auto pb-2">
            </div>
    </header>

    <main id="tab-daily" class="max-w-md mx-auto px-4 mt-2 space-y-6">
        <div class="macaron-card p-6 flex justify-around items-center">
            <div class="text-center">
                <p class="text-[11px] uppercase text-gray-400 mb-1 font-bold">Weight</p>
                <p id="v-w" class="text-3xl font-black text-teal-500">--</p>
            </div>
            <div class="text-center">
                <p class="text-[11px] uppercase text-gray-400 mb-1 font-bold">Protein</p>
                <p id="v-p" class="text-3xl font-black text-blue-400">0</p>
