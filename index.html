<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>健康能量紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bear-mint: #a3e4d7; --bear-soft-bg: #f4f9f9; --text-dark: #566573; }
        html, body { overscroll-behavior-y: auto; height: 100%; margin: 0; }
        body { background-color: var(--bear-soft-bg); color: var(--text-dark); font-family: -apple-system, sans-serif; padding-bottom: 100px; padding-top: env(safe-area-inset-top); }
        .macaron-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid white; box-shadow: 0 8px 20px rgba(163, 228, 215, 0.1); }
        .nav-item.active { color: #a3e4d7; }
        .nav-item { color: #aab7b7; transition: all 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-bear { border: 1px solid var(--bear-mint); border-radius: 0.75rem; padding: 0.6rem; background: white; width: 100%; text-align: center; font-size: 0.9rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        ::-webkit-scrollbar { display: none; }
        #date-slider { scroll-behavior: smooth; display: flex; overflow-x: auto; gap: 0.75rem; padding: 1rem; }
        .date-item { flex: 0 0 60px; transition: all 0.3s; border-radius: 1rem; padding: 5px 0; }
        .date-item.active { transform: scale(1.1); font-weight: 900; color: #14b8a6; background: rgba(20, 184, 166, 0.1); }
        .calendar-wrapper { position: relative; width: 40px; height: 40px; }
        .calendar-wrapper input[type="date"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 30; cursor: pointer; }
        .calendar-icon-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 9999px; background: white; display: flex; align-items: center; justify-content: center; color: #2dd4bf; box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 20; }
        .title-btn { background: rgba(255,255,255,0.5); padding: 4px 16px; border-radius: 99px; }
        .inbody-card { background: white; border-radius: 1rem; padding: 1rem; margin-bottom: 0.75rem; border-left: 4px solid #a3e4d7; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-5 max-w-md mx-auto sticky top-0 bg-[#f4f9f9]/90 backdrop-blur-md z-[100]">
        <div class="calendar-wrapper" id="cal-wrap">
            <div class="calendar-icon-bg"><i class="fa-solid fa-calendar-alt"></i></div>
            <input type="date" id="date-picker" onchange="changeDate(this.value)">
        </div>
        <div id="title-area" onclick="backToToday()" class="title-btn cursor-pointer text-center">
            <h1 id="main-title" class="text-lg font-black text-slate-800 tracking-tight">今日</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="openChartModal()" id="btn-chart" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-teal-500 shadow-sm"><i class="fa-solid fa-chart-line"></i></button>
            <button onclick="handleHistoryBtn()" id="btn-history" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-400 shadow-sm"><i class="fa-solid fa-list-ul"></i></button>
            <button onclick="openModal('inbody-form-modal')" id="btn-add-inbody" class="hidden w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white shadow-sm font-bold text-xl">+</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        <div id="page-daily" class="tab-content active space-y-4">
            <div class="macaron-card"><div id="date-slider"></div></div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">體重 (kg)</p><p id="view-weight" class="text-2xl font-black text-teal-500">--</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">蛋白 (g)</p><p id="view-pro" class="text-2xl font-black text-blue-400">0</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">碳水 (g)</p><p id="view-carb" class="text-2xl font-black text-orange-300">0</p></div>
            </div>
            <div class="macaron-card p-5">
                <div id="view-poop" class="mb-2 hidden"><span class="bg-blue-50 text-blue-500 text-[10px] px-2 py-1 rounded-full font-bold">🔵 今日已上廁所</span></div>
                <p id="view-content" class="text-sm text-gray-500 italic">點擊下方輸入...</p>
            </div>
            <div class="macaron-card p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <input id="in-weight" type="number" step="0.1" class="input-bear" placeholder="體重">
                    <input id="in-pro" type="number" class="input-bear" placeholder="蛋白">
                    <input id="in-carb" type="number" class="input-bear" placeholder="碳水">
                </div>
                <label class="flex items-center gap-2 text-sm font-bold text-slate-500"><input type="checkbox" id="in-poop" class="w-5 h-5 accent-teal-300">🚽 今日有上廁所嗎？</label>
                <textarea id="in-content" rows="2" class="input-bear text-left" placeholder="記錄飲食..."></textarea>
                <button onclick="saveDailyData()" class="w-full bg-gradient-to-r from-teal-200 to-blue-200 text-white py-4 rounded-2xl font-bold">儲存</button>
            </div>
        </div>

        <div id="page-inbody" class="tab-content space-y-4">
            <div id="inbody-latest-view"></div>
            <div id="inbody-history-list" class="pb-10"></div>
        </div>

        <div id="page-settings" class="tab-content space-y-6 pt-4">
            <div class="macaron-card p-6 space-y-4">
                <button onclick="exportAllData()" class="w-full p-4 bg-teal-50 rounded-xl font-bold">備份匯出</button>
                <button onclick="document.getElementById('import-file').click()" class="w-full p-4 bg-blue-50 rounded-xl font-bold">還原匯入</button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importAllData(event)">
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white shadow-lg z-[100] pb-safe flex justify-around p-4 rounded-t-3xl">
        <button onclick="switchPage('daily')" id="nav-daily" class="nav-item active flex flex-col items-center"><i class="fa-solid fa-calendar-check text-xl"></i><span class="text-[10px] mt-1 font-bold">紀錄</span></button>
        <button onclick="switchPage('inbody')" id="nav-inbody" class="nav-item flex flex-col items-center"><i class="fa-solid fa-weight-scale text-xl"></i><span class="text-[10px] mt-1 font-bold">InBody</span></button>
        <button onclick="switchPage('settings')" id="nav-settings" class="nav-item flex flex-col items-center"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] mt-1 font-bold">設置</span></button>
    </footer>

    <div id="chart-modal" class="modal"><div class="bg-white w-full max-w-md h-[65vh] rounded-t-3xl p-6 flex flex-col"><div class="flex justify-between font-bold text-teal-500 mb-4"><span>體重趨勢</span><button onclick="closeModal('chart-modal')">&times;</button></div><div class="flex-1"><canvas id="weightChart"></canvas></div></div></div>
    
    <div id="inbody-form-modal" class="modal"><div class="bg-white p-6 rounded-3xl w-11/12 max-w-sm"><h3 class="font-bold mb-4">新增 InBody 紀錄</h3><input id="f-date" type="date" class="input-bear mb-2"><input id="f-weight" type="number" step="0.1" placeholder="體重 (kg)" class="input-bear mb-4"><button onclick="submitInBody()" class="w-full bg-blue-400 text-white py-3 rounded-xl font-bold">儲存</button><button onclick="closeModal('inbody-form-modal')" class="w-full mt-2 text-gray-400">取消</button></div></div>

    <div id="history-modal" class="modal items-end"><div class="bg-white w-full max-w-md rounded-t-3xl max-h-[70vh] p-6 overflow-y-auto"><h3 class="font-bold mb-4 text-teal-600">紀錄清單</h3><table class="w-full text-sm text-center"><thead><tr class="text-gray-400 border-b"><th>日期</th><th>體重</th><th>🚽</th></tr></thead><tbody id="history-table-body"></tbody></table></div></div>

    <script>
        function getLocalDateString(d = new Date()) { const offset = d.getTimezoneOffset() * 60000; return (new Date(d - offset)).toISOString().split('T')[0]; }
        let dailyDb = JSON.parse(localStorage.getItem('bear_daily_db') || '{}');
        let inbodyDb = JSON.parse(localStorage.getItem('bear_inbody_db') || '[]');
        let currentViewingDate = getLocalDateString();
        let myChart = null;
        let currentPage = 'daily';

        function init() { 
            document.getElementById('date-picker').value = currentViewingDate;
            renderDateSlider(); 
            updateDailyUI(); 
        }

        function backToToday() { 
            if(currentPage !== 'daily') return;
            changeDate(getLocalDateString()); 
        }

        function changeDate(d) { 
            if(!d) return; 
            currentViewingDate = d; 
            renderDateSlider(); 
            updateDailyUI(); 
        }

        function updateDailyUI() {
            if(currentPage !== 'daily') return;
            const today = getLocalDateString();
            const titleEl = document.getElementById('main-title');
            titleEl.innerText = (currentViewingDate === today) ? "今日" : currentViewingDate.replaceAll('-', '/');

            const d = dailyDb[currentViewingDate] || { weight:'', pro:0, carb:0, content:'', poop: false };
            document.getElementById('view-weight').innerText = d.weight || '--';
            document.getElementById('view-pro').innerText = d.pro || 0;
            document.getElementById('view-carb').innerText = d.carb || 0;
            document.getElementById('view-content').innerText = d.content || '點擊下方輸入紀錄...';
            d.poop ? document.getElementById('view-poop').classList.remove('hidden') : document.getElementById('view-poop').classList.add('hidden');
            
            document.getElementById('in-weight').value = d.weight;
            document.getElementById('in-pro').value = d.pro || '';
            document.getElementById('in-carb').value = d.carb || '';
            document.getElementById('in-content').value = d.content || '';
            document.getElementById('in-poop').checked = d.poop || false;
            document.getElementById('date-picker').value = currentViewingDate;
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider');
            if(!slider) return;
            slider.innerHTML = '';
            for (let i = -15; i <= 15; i++) {
                const d = new Date(currentViewingDate); d.setDate(d.getDate() + i);
                const ds = getLocalDateString(d);
                const active = (ds === currentViewingDate) ? 'active' : 'opacity-40';
                slider.innerHTML += `<div id="date-item-${ds}" onclick="changeDate('${ds}')" class="date-item text-center cursor-pointer ${active}"><p class="text-[10px]">${d.getMonth()+1}/${d.getDate()}</p><p class="text-xs font-bold">${dailyDb[ds]?.weight || '--'}</p></div>`;
            }
            setTimeout(() => { document.getElementById(`date-item-${currentViewingDate}`)?.scrollIntoView({ behavior: 'smooth', inline: 'center' }); }, 100);
        }

        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById(`nav-${page}`).classList.add('active');
            
            const titleEl = document.getElementById('main-title');
            const titleBtn = document.getElementById('title-area');
            
            if(page === 'daily') {
                titleBtn.style.pointerEvents = 'auto'; // 啟用點擊回今日
                updateDailyUI();
            } else {
                titleBtn.style.pointerEvents = 'none'; // 停用點擊回今日
                titleEl.innerText = (page === 'inbody') ? 'InBody' : '設置';
            }

            document.getElementById('btn-chart').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-history').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-add-inbody').classList.toggle('hidden', page !== 'inbody');
            document.getElementById('cal-wrap').style.visibility = (page === 'settings') ? 'hidden' : 'visible';

            if(page === 'inbody') renderInBodyPage();
        }

        function renderInBodyPage() {
            const list = document.getElementById('inbody-history-list');
            const latest = document.getElementById('inbody-latest-view');
            if(!list || !latest) return;
            if(inbodyDb.length === 0) { 
                latest.innerHTML = '<div class="macaron-card p-10 text-center text-gray-400">尚無紀錄，點擊右上方 + 新增</div>'; 
                list.innerHTML = ''; return; 
            }
            latest.innerHTML = `<div class="macaron-card p-6 bg-gradient-to-br from-teal-50 to-white border-teal-100 border"><p class="text-sm text-gray-400">最新 InBody 體重</p><p class="text-3xl font-black text-teal-600">${inbodyDb[0].weight} <span class="text-sm">kg</span></p><p class="text-[10px] mt-2 text-gray-300">量測日期：${inbodyDb[0].date}</p></div>`;
            list.innerHTML = '<h3 class="font-bold my-4 px-2">歷史紀錄</h3>' + inbodyDb.map((i, idx) => `<div class="inbody-card flex justify-between items-center"><div><p class="text-xs text-gray-400">${i.date}</p><p class="font-bold">${i.weight} kg</p></div><button onclick="deleteInBody(${idx})" class="text-red-200"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
        }

        function submitInBody() {
            const date = document.getElementById('f-date').value;
            const weight = document.getElementById('f-weight').value;
            if(!date || !weight) return alert('請輸入日期與體重');
            inbodyDb.unshift({ date, weight });
            inbodyDb.sort((a,b) => b.date.localeCompare(a.date));
            localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb));
            closeModal('inbody-form-modal');
            renderInBodyPage();
        }

        function deleteInBody(idx) { if(confirm('確定刪除此紀錄？')) { inbodyDb.splice(idx,1); localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); renderInBodyPage(); } }

        function saveDailyData() {
            dailyDb[currentViewingDate] = { 
                weight: document.getElementById('in-weight').value, 
                pro: document.getElementById('in-pro').value||0, 
                carb: document.getElementById('in-carb').value||0, 
                content: document.getElementById('in-content').value,
                poop: document.getElementById('in-poop').checked
            };
            localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb));
            renderDateSlider(); 
            updateDailyUI();
            alert('儲存成功 ✨');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function handleHistoryBtn() { openModal('history-modal'); renderHistoryTable(); }
        function renderHistoryTable() {
            const body = document.getElementById('history-table-body');
            const dates = Object.keys(dailyDb).sort().reverse();
            body.innerHTML = dates.map(d => `<tr class="border-b border-gray-50" onclick="changeDate('${d}');closeModal('history-modal')"><td class="py-4">${d.replaceAll('-','/')}</td><td class="font-bold">${dailyDb[d].weight}</td><td>${dailyDb[d].poop ? '🔵' : ''}</td></tr>`).join('');
        }

        function openChartModal() {
            openModal('chart-modal');
            const dates = Object.keys(dailyDb).sort().slice(-14);
            const weights = dates.map(d => parseFloat(dailyDb[d].weight) || null);
            if (myChart) myChart.destroy();
            myChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: { labels: dates.map(d => d.split('-').slice(1).join('/')), datasets: [{ label: '體重', data: weights, borderColor: '#2dd4bf', tension: 0.4, fill: true, backgroundColor: 'rgba(163, 228, 215, 0.2)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function exportAllData() {
            const data = { daily: dailyDb, inbody: inbodyDb };
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `health_data_${getLocalDateString()}.json`; a.click();
        }

        function importAllData(e) {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = JSON.parse(e.target.result);
                if(data.daily) dailyDb = data.daily;
                if(data.inbody) inbodyDb = data.inbody;
                localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb));
                localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb));
                location.reload();
            };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
