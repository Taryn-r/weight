<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>健康能量紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bear-mint: #a3e4d7; --bear-soft-bg: #f4f9f9; --text-dark: #566573; }
        
        /* 允許下拉整理行為 */
        html, body { 
            overscroll-behavior-y: auto; 
            height: 100%;
        }

        body { 
            background-color: var(--bear-soft-bg); 
            color: var(--text-dark); 
            font-family: -apple-system, sans-serif; 
            padding-bottom: 100px; 
            padding-top: env(safe-area-inset-top);
        }

        .macaron-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid white; box-shadow: 0 8px 20px rgba(163, 228, 215, 0.1); }
        .nav-item.active { color: #a3e4d7; }
        .nav-item { color: #aab7b7; transition: all 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-bear { border: 1px solid var(--bear-mint); border-radius: 0.75rem; padding: 0.6rem; background: white; width: 100%; text-align: center; font-size: 0.9rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .diff-pos { color: #f87171; font-weight: normal; }
        .diff-neg { color: #34d399; font-weight: normal; }
        .inbody-label { font-size: 10px; color: #94a3b8; margin-bottom: 2px; display: block; font-weight: bold; }
        ::-webkit-scrollbar { display: none; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { color: #94a3b8; font-weight: bold; padding: 10px 2px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .history-table td { padding: 12px 2px; text-align: center; border-bottom: 1px solid #f8fafc; white-space: nowrap; }
        .blue-dot { color: #60a5fa; font-size: 12px; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-5 max-w-md mx-auto sticky top-0 bg-[#f4f9f9]/80 backdrop-blur-sm z-10">
        <button onclick="document.getElementById('date-picker').showPicker()" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-teal-400 shadow-sm"><i class="fa-solid fa-calendar-alt"></i></button>
        <h1 id="main-title" class="text-xl font-black text-slate-800 tracking-wider">每日紀錄</h1>
        <button onclick="handleHistoryBtn()" id="right-btn" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-400 shadow-sm"><i class="fa-solid fa-list-ul"></i></button>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        <div id="page-daily" class="tab-content active space-y-4">
            <div id="date-slider" class="flex justify-between items-center macaron-card p-4 overflow-x-auto gap-2"></div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">體重 (kg)</p><p id="view-weight" class="text-2xl font-black text-teal-500">--</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">蛋白 (g)</p><p id="view-pro" class="text-2xl font-black text-blue-400">0</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">碳水 (g)</p><p id="view-carb" class="text-2xl font-black text-orange-300">0</p></div>
            </div>
            
            <div class="macaron-card p-5">
                <div id="view-poop" class="mb-2 hidden"><span class="bg-blue-50 text-blue-500 text-[10px] px-2 py-1 rounded-full font-bold">🔵 今日已上廁所</span></div>
                <p id="view-content" class="text-sm text-gray-500 italic">尚未寫下內容...</p>
            </div>

            <div class="macaron-card p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <input id="in-weight" type="number" step="0.1" class="input-bear" placeholder="體重">
                    <input id="in-pro" type="number" class="input-bear" placeholder="蛋白">
                    <input id="in-carb" type="number" class="input-bear" placeholder="碳水">
                </div>
                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center gap-2 text-sm font-bold text-slate-500 cursor-pointer">
                        <input type="checkbox" id="in-poop" class="w-5 h-5 accent-teal-300">
                        🚽 今日有上廁所嗎？
                    </label>
                </div>
                <textarea id="in-content" rows="2" class="input-bear text-left" placeholder="記錄今日飲食..."></textarea>
                <div class="flex gap-2">
                    <button onclick="saveDailyData()" class="flex-1 bg-gradient-to-r from-teal-200 to-blue-200 text-white py-4 rounded-2xl font-bold">儲存數據</button>
                    <button onclick="deleteDailyData()" class="w-14 bg-red-50 text-red-300 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>

        <div id="page-inbody" class="tab-content space-y-4">
            <div id="inbody-latest-view" class="space-y-4"></div>
            <div class="flex justify-between items-center px-2">
                <h4 class="text-xs font-bold text-gray-300 uppercase">歷史報告清單</h4>
                <button onclick="openModal('inbody-form-modal')" class="text-xs bg-blue-400 text-white px-3 py-1 rounded-full shadow-sm font-bold">+ 新增數據</button>
            </div>
            <div id="inbody-history-list" class="space-y-3 pb-10"></div>
        </div>

        <div id="page-settings" class="tab-content space-y-6 pt-4">
            <div class="macaron-card p-6 space-y-4">
                <h3 class="font-bold text-slate-700 border-b pb-2"><i class="fa-solid fa-database mr-2 text-teal-400"></i>數據管理</h3>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="exportAllData()" class="w-full p-4 bg-teal-50 text-teal-700 rounded-xl font-bold flex justify-between items-center">
                        <span><i class="fa-solid fa-file-export mr-2"></i>備份匯出 (.json)</span>
                        <i class="fa-solid fa-chevron-right opacity-30"></i>
                    </button>
                    <button onclick="document.getElementById('import-file').click()" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold flex justify-between items-center">
                        <span><i class="fa-solid fa-file-import mr-2"></i>還原匯入資料</span>
                        <i class="fa-solid fa-chevron-right opacity-30"></i>
                    </button>
                </div>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importAllData(event)">
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md rounded-t-[2.5rem] shadow-lg z-50 pb-safe">
        <div class="max-w-md mx-auto flex justify-around p-4">
            <button onclick="switchPage('daily')" id="nav-daily" class="nav-item active flex flex-col items-center"><i class="fa-solid fa-calendar-check text-xl"></i><span class="text-[10px] mt-1 font-bold">每日紀錄</span></button>
            <button onclick="switchPage('inbody')" id="nav-inbody" class="nav-item flex flex-col items-center"><i class="fa-solid fa-weight-scale text-xl"></i><span class="text-[10px] mt-1 font-bold">InBody</span></button>
            <button onclick="switchPage('settings')" id="nav-settings" class="nav-item flex flex-col items-center"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] mt-1 font-bold">設置</span></button>
        </div>
    </footer>

    <div id="inbody-detail-modal" class="modal" onclick="closeModal('inbody-detail-modal')">
        <div class="bg-white w-11/12 max-w-sm rounded-[2rem] p-6 space-y-4" onclick="event.stopPropagation()">
            <div id="inbody-detail-content"></div>
            <button onclick="closeModal('inbody-detail-modal')" class="w-full py-3 bg-gray-100 text-gray-400 rounded-xl font-bold">關閉</button>
        </div>
    </div>

    <div id="inbody-form-modal" class="modal">
        <div class="bg-white w-full max-w-md h-[90vh] rounded-t-[2rem] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6"><h3 class="font-bold text-xl text-blue-500">新增 InBody 報告</h3><button onclick="closeModal('inbody-form-modal')" class="text-2xl text-gray-300">&times;</button></div>
            <div class="grid grid-cols-2 gap-4 pb-10">
                <div class="col-span-2"><label class="inbody-label">測量日期</label><input id="f-date" type="date" class="input-bear"></div>
                <div><label class="inbody-label">體重 (kg)</label><input id="f-weight" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">骨骼肌 (kg)</label><input id="f-muscle" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">體脂重 (kg)</label><input id="f-fat-kg" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">BMI</label><input id="f-bmi" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">體脂率 (%)</label><input id="f-fat-p" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">腰臀比 (WHR)</label><input id="f-whr" type="number" step="0.01" class="input-bear"></div>
                <div><label class="inbody-label">水分比 (%)</label><input id="f-moist" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">內臟脂肪</label><input id="f-visceral" type="number" class="input-bear"></div>
                <div><label class="inbody-label">基礎代謝 (kcal)</label><input id="f-bmr" type="number" class="input-bear"></div>
                <div><label class="inbody-label">身體評分</label><input id="f-score" type="number" class="input-bear"></div>
                <div class="col-span-2 mt-4"><button onclick="submitInBody()" class="w-full bg-blue-400 text-white py-4 rounded-2xl font-bold shadow-md">儲存數據</button></div>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal items-end">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-white sticky top-0">
                <h3 class="font-bold text-teal-600">數據歷史紀錄</h3>
                <button onclick="closeModal('history-modal')" class="text-gray-300 text-2xl">&times;</button>
            </div>
            <div class="overflow-y-auto p-4 flex-1">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th width="18%">日期</th>
                            <th width="32%">體重(差)</th>
                            <th width="20%">蛋白</th>
                            <th width="20%">碳水</th>
                            <th width="10%">廁所</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <input type="date" id="date-picker" class="hidden" onchange="changeDate(this.value)">

    <script>
        function getLocalDateString(dateObj = new Date()) {
            const offset = dateObj.getTimezoneOffset() * 60000;
            return (new Date(dateObj - offset)).toISOString().split('T')[0];
        }

        let dailyDb = JSON.parse(localStorage.getItem('bear_daily_db') || '{}');
        let inbodyDb = JSON.parse(localStorage.getItem('bear_inbody_db') || '[]');
        let currentViewingDate = getLocalDateString();

        function init() { renderDateSlider(); updateDailyUI(); }

        function switchPage(page) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById(`nav-${page}`).classList.add('active');
            const titles = { daily: '每日紀錄', inbody: 'InBody 數據庫', settings: '設置中心' };
            document.getElementById('main-title').innerText = titles[page];
            document.getElementById('right-btn').style.visibility = (page === 'daily') ? 'visible' : 'hidden';
            if (page === 'inbody') renderInBodyPage();
        }

        function openModal(id) {
            if (id === 'inbody-form-modal') resetInBodyForm();
            document.getElementById(id).style.display = 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- InBody 邏輯 ---
        function resetInBodyForm() {
            const ids = ['f-date', 'f-weight', 'f-muscle', 'f-fat-kg', 'f-bmi', 'f-fat-p', 'f-whr', 'f-moist', 'f-visceral', 'f-bmr', 'f-score'];
            ids.forEach(id => {
                document.getElementById(id).value = (id === 'f-date') ? getLocalDateString() : '';
            });
        }

        function submitInBody() {
            const data = { 
                id: Date.now(), 
                date: document.getElementById('f-date').value, 
                weight: parseFloat(document.getElementById('f-weight').value)||0, 
                muscle: parseFloat(document.getElementById('f-muscle').value)||0, 
                fatKg: parseFloat(document.getElementById('f-fat-kg').value)||0,
                bmi: parseFloat(document.getElementById('f-bmi').value)||0,
                fatP: parseFloat(document.getElementById('f-fat-p').value)||0, 
                whr: parseFloat(document.getElementById('f-whr').value)||0,
                moist: parseFloat(document.getElementById('f-moist').value)||0,
                visceral: parseInt(document.getElementById('f-visceral').value)||0, 
                bmr: parseInt(document.getElementById('f-bmr').value)||0,
                score: parseInt(document.getElementById('f-score').value)||0 
            };
            if(!data.date) return alert('請選擇日期');
            inbodyDb.unshift(data);
            inbodyDb.sort((a,b) => new Date(b.date) - new Date(a.date));
            localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb));
            closeModal('inbody-form-modal');
            renderInBodyPage();
        }

        function renderInBodyPage() {
            const latestArea = document.getElementById('inbody-latest-view');
            const historyList = document.getElementById('inbody-history-list');
            if (inbodyDb.length === 0) { latestArea.innerHTML = '<div class="macaron-card p-10 text-center text-gray-400 text-sm">尚未有紀錄</div>'; historyList.innerHTML = ''; return; }
            const latest = inbodyDb[0]; const prev = inbodyDb[1];
            latestArea.innerHTML = `<div class="macaron-card p-6 border-t-8 border-t-blue-200" onclick="viewInBodyDetail(${latest.id})">
                <div class="flex justify-between items-center mb-4 border-b pb-2"><span class="font-black text-slate-700">${latest.date}</span><span class="text-blue-500 font-bold">評分 ${latest.score}${getDiff(latest.score, prev?.score, false)}</span></div>
                <div class="grid grid-cols-2 gap-y-4 text-center">
                    <div><p class="text-[10px] text-gray-400 uppercase">體重</p><p class="font-bold">${latest.weight}k${getDiff(latest.weight, prev?.weight)}</p></div>
                    <div><p class="text-[10px] text-gray-400 uppercase">肌肉</p><p class="font-bold">${latest.muscle}k${getDiff(latest.muscle, prev?.muscle, false)}</p></div>
                    <div><p class="text-[10px] text-gray-400 uppercase">體脂率</p><p class="font-bold">${latest.fatP}%${getDiff(latest.fatP, prev?.fatP)}</p></div>
                    <div class="bg-gray-50 rounded-lg p-1"><p class="text-[10px] text-gray-400 uppercase">內臟脂肪</p><p class="font-bold">${latest.visceral}${getDiff(latest.visceral, prev?.visceral)}</p></div>
                </div></div>`;
            historyList.innerHTML = inbodyDb.map(item => `<div class="macaron-card p-4 flex justify-between items-center" onclick="viewInBodyDetail(${item.id})">
                <div><p class="text-xs font-bold text-slate-600">${item.date}</p><p class="text-[10px] text-gray-400">體重 ${item.weight} / 體脂 ${item.fatP}%</p></div>
                <button onclick="deleteInBody(${item.id}, event)" class="p-2 text-red-100"><i class="fa-solid fa-trash-can"></i></button></div>`).join('');
        }

        function viewInBodyDetail(id) {
            const it = inbodyDb.find(i => i.id === id); if(!it) return;
            document.getElementById('inbody-detail-content').innerHTML = `<h3 class="text-center font-black mb-4">${it.date} 完整報告</h3>
                <div class="grid grid-cols-2 gap-2 text-xs">
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體重</span>${it.weight} kg</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">骨骼肌</span>${it.muscle} kg</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體脂重</span>${it.fatKg} kg</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體脂率</span>${it.fatP} %</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">BMI</span>${it.bmi}</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">腰臀比</span>${it.whr}</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">水分比</span>${it.moist} %</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">內臟脂肪</span>${it.visceral}</div>
                    <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">基礎代謝</span>${it.bmr} kcal</div>
                    <div class="col-span-2 bg-blue-50 p-3 rounded-lg text-center font-bold text-blue-600"><span class="inbody-label">身體評分</span>${it.score} 分</div>
                </div>`;
            openModal('inbody-detail-modal');
        }

        function deleteInBody(id, e) { e.stopPropagation(); if(confirm('確定刪除此筆 InBody 紀錄？')){ inbodyDb = inbodyDb.filter(i => i.id !== id); localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); renderInBodyPage(); } }

        // --- 每日紀錄邏輯 ---
        function saveDailyData() {
            dailyDb[currentViewingDate] = { 
                weight: document.getElementById('in-weight').value, 
                pro: document.getElementById('in-pro').value||0, 
                carb: document.getElementById('in-carb').value||0, 
                content: document.getElementById('in-content').value,
                poop: document.getElementById('in-poop').checked
            };
            localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb));
            renderDateSlider(); updateDailyUI(); alert('紀錄成功 ✨');
        }
        function deleteDailyData() { if(confirm('確定清空今日紀錄？')){ delete dailyDb[currentViewingDate]; localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb)); renderDateSlider(); updateDailyUI(); } }
        function changeDate(d) { currentViewingDate = d; renderDateSlider(); updateDailyUI(); }
        
        function renderDateSlider() {
            const slider = document.getElementById('date-slider'); slider.innerHTML = '';
            for (let i=-3; i<=3; i++) {
                const d = new Date(); d.setDate(d.getDate()+i); 
                const ds = getLocalDateString(d);
                const active = (ds === currentViewingDate) ? '!opacity-100 scale-110 font-black text-teal-500' : '';
                const hasData = dailyDb[ds] ? dailyDb[ds].weight : '--';
                const poopDot = (dailyDb[ds] && dailyDb[ds].poop) ? '<span class="text-[8px] text-blue-400">●</span>' : '';
                slider.innerHTML += `<button onclick="changeDate('${ds}')" class="flex-shrink-0 text-center opacity-40 transition-all ${active}"><p class="text-[10px]">${i===0?'今':d.getDate()}</p><p class="text-xs">${hasData}k</p>${poopDot}</button>`;
            }
        }
        
        function updateDailyUI() {
            const d = dailyDb[currentViewingDate] || { weight:'', pro:0, carb:0, content:'', poop: false };
            document.getElementById('view-weight').innerText = d.weight || '--';
            document.getElementById('view-pro').innerText = d.pro || 0;
            document.getElementById('view-carb').innerText = d.carb || 0;
            document.getElementById('view-content').innerText = d.content || '點擊下方輸入紀錄...';
            const poopView = document.getElementById('view-poop');
            if (d.poop) { poopView.classList.remove('hidden'); } else { poopView.classList.add('hidden'); }
            document.getElementById('in-weight').value = d.weight;
            document.getElementById('in-pro').value = d.pro || '';
            document.getElementById('in-carb').value = d.carb || '';
            document.getElementById('in-content').value = d.content || '';
            document.getElementById('in-poop').checked = d.poop || false;
        }

        function handleHistoryBtn() { openModal('history-modal'); renderHistoryTable(); }
        
        function renderHistoryTable() {
            const tbody = document.getElementById('history-table-body'); tbody.innerHTML = '';
            const dates = Object.keys(dailyDb).sort().reverse();
            
            dates.forEach((d) => {
                const cur = dailyDb[d];
                let diffText = "";
                const sortedDates = Object.keys(dailyDb).sort(); 
                const curIdx = sortedDates.indexOf(d);
                if (curIdx > 0) {
                    const prevDate = sortedDates[curIdx - 1];
                    const prevWeight = parseFloat(dailyDb[prevDate].weight);
                    const curWeight = parseFloat(cur.weight);
                    if (!isNaN(prevWeight) && !isNaN(curWeight)) {
                        const diff = (curWeight - prevWeight).toFixed(1);
                        const diffClass = diff > 0 ? 'diff-pos' : (diff < 0 ? 'diff-neg' : '');
                        // 這裡移除了 <br>，並微調字體大小與粗細
                        diffText = ` <span class="${diffClass} text-[9px] font-normal tracking-tighter">(${diff > 0 ? '+' : ''}${diff})</span>`;
                    }
                }

                const poopMark = cur.poop ? '<span class="blue-dot">🔵</span>' : '';
                
                tbody.innerHTML += `
                    <tr onclick="changeDate('${d}');closeModal('history-modal')">
                        <td class="text-gray-400 font-medium">${d.split('-').slice(1).join('/')}</td>
                        <td class="font-bold text-slate-600">${cur.weight || '--'}${diffText}</td>
                        <td class="text-blue-400">${cur.pro || 0}g</td>
                        <td class="text-orange-300">${cur.carb || 0}g</td>
                        <td>${poopMark}</td>
                    </tr>`;
            });
        }

        function exportAllData() {
            const data = JSON.stringify({daily:dailyDb, inbody:inbodyDb});
            const blob = new Blob([data], {type:"application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `健康備份_${getLocalDateString()}.json`; a.click();
        }
        function importAllData(e) {
            const reader = new FileReader(); reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    if(confirm('確認匯入？這會覆蓋目前的紀錄。')){ dailyDb=data.daily; inbodyDb=data.inbody; localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb)); localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); location.reload(); }
                } catch(e) { alert('檔案格式不正確'); }
            }; reader.readAsText(e.target.files[0]);
        }
        function getDiff(v, pv, gd=true) { if(pv===undefined) return ""; const df = (v-pv).toFixed(1); if(df==0) return " (±0)"; return `<span class="${(df>0 !== gd)?'diff-pos':'diff-neg'} ml-1">(${df>0?'+':''}${df})</span>`; }
        
        init();
    </script>
</body>
</html>
