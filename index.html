<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>健康能量紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bear-mint: #a3e4d7; --bear-soft-bg: #f4f9f9; --text-dark: #566573; }
        html, body { overscroll-behavior-y: auto; height: 100%; }
        body { background-color: var(--bear-soft-bg); color: var(--text-dark); font-family: -apple-system, sans-serif; padding-bottom: 100px; padding-top: env(safe-area-inset-top); }
        .macaron-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid white; box-shadow: 0 8px 20px rgba(163, 228, 215, 0.1); }
        .nav-item.active { color: #a3e4d7; }
        .nav-item { color: #aab7b7; transition: all 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-bear { border: 1px solid var(--bear-mint); border-radius: 0.75rem; padding: 0.6rem; background: white; width: 100%; text-align: center; font-size: 0.9rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        ::-webkit-scrollbar { display: none; }
        
        /* 日期滑動條樣式 */
        #date-slider { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; display: flex; overflow-x: auto; gap: 0.75rem; padding: 1rem; }
        .date-item { flex: 0 0 60px; transition: all 0.3s; }
        .date-item.active { transform: scale(1.1); font-weight: 900; color: #14b8a6; }

        .calendar-wrapper { position: relative; width: 40px; height: 40px; }
        .calendar-wrapper input[type="date"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 30; cursor: pointer; }
        .calendar-icon-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 9999px; background: white; display: flex; align-items: center; justify-content: center; color: #2dd4bf; box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 20; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .history-table th { color: #94a3b8; padding: 10px 2px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .history-table td { padding: 12px 2px; text-align: center; border-bottom: 1px solid #f8fafc; }
        .diff-pos { color: #f87171; } .diff-neg { color: #34d399; }
    </style>
</head>
<body>

    <header class="flex justify-between items-center p-5 max-w-md mx-auto sticky top-0 bg-[#f4f9f9]/90 backdrop-blur-md z-[100]">
        <div class="calendar-wrapper" id="cal-wrap">
            <div class="calendar-icon-bg"><i class="fa-solid fa-calendar-alt"></i></div>
            <input type="date" id="date-picker" onchange="changeDate(this.value)">
        </div>

        <h1 id="main-title" class="text-xl font-black text-slate-800 tracking-wider">每日紀錄</h1>

        <div class="flex gap-2">
            <button onclick="openChartModal()" id="btn-chart" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-teal-500 shadow-sm"><i class="fa-solid fa-chart-line"></i></button>
            <button onclick="handleHistoryBtn()" id="btn-history" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-400 shadow-sm"><i class="fa-solid fa-list-ul"></i></button>
            <button onclick="openModal('inbody-form-modal')" id="btn-add-inbody" class="hidden w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white shadow-sm font-bold text-xl">+</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        <div id="page-daily" class="tab-content active space-y-4">
            <div class="macaron-card">
                <div id="date-slider"></div>
            </div>

            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">體重 (kg)</p><p id="view-weight" class="text-2xl font-black text-teal-500">--</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">蛋白 (g)</p><p id="view-pro" class="text-2xl font-black text-blue-400">0</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">碳水 (g)</p><p id="view-carb" class="text-2xl font-black text-orange-300">0</p></div>
            </div>
            
            <div class="macaron-card p-5">
                <div id="view-poop" class="mb-2 hidden"><span class="bg-blue-50 text-blue-500 text-[10px] px-2 py-1 rounded-full font-bold">🔵 今日已上廁所</span></div>
                <p id="view-content" class="text-sm text-gray-500 italic">尚未寫下內容...</p>
            </div>

            <div class="macaron-card p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <input id="in-weight" type="number" step="0.1" class="input-bear" placeholder="體重">
                    <input id="in-pro" type="number" class="input-bear" placeholder="蛋白">
                    <input id="in-carb" type="number" class="input-bear" placeholder="碳水">
                </div>
                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center gap-2 text-sm font-bold text-slate-500 cursor-pointer">
                        <input type="checkbox" id="in-poop" class="w-5 h-5 accent-teal-300">
                        🚽 今日有上廁所嗎？
                    </label>
                </div>
                <textarea id="in-content" rows="2" class="input-bear text-left" placeholder="記錄今日飲食..."></textarea>
                <div class="flex gap-2">
                    <button onclick="saveDailyData()" class="flex-1 bg-gradient-to-r from-teal-200 to-blue-200 text-white py-4 rounded-2xl font-bold">儲存數據</button>
                    <button onclick="deleteDailyData()" class="w-14 bg-red-50 text-red-300 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>

        <div id="page-inbody" class="tab-content space-y-4">
            <div id="inbody-latest-view" class="space-y-4"></div>
            <div id="inbody-history-list" class="space-y-3 pb-10"></div>
        </div>
        <div id="page-settings" class="tab-content space-y-6 pt-4">
             <div class="macaron-card p-6 space-y-4">
                <button onclick="exportAllData()" class="w-full p-4 bg-teal-50 text-teal-700 rounded-xl font-bold flex justify-between"><span>備份匯出</span><i class="fa-solid fa-chevron-right"></i></button>
                <button onclick="document.getElementById('import-file').click()" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold flex justify-between"><span>還原資料</span><i class="fa-solid fa-chevron-right"></i></button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importAllData(event)">
            </div>
        </div>
    </main>

    <div id="chart-modal" class="modal">
        <div class="bg-white w-full max-w-md h-[70vh] rounded-t-[2rem] p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-teal-600">體重變化趨勢</h3><button onclick="closeModal('chart-modal')" class="text-2xl text-gray-300">&times;</button></div>
            <div class="flex-1 min-h-0"><canvas id="weightChart"></canvas></div>
        </div>
    </div>

    <div id="history-modal" class="modal items-end">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center sticky top-0 bg-white">
                <h3 class="font-bold text-teal-600">數據歷史紀錄</h3>
                <button onclick="closeModal('history-modal')" class="text-gray-300 text-2xl">&times;</button>
            </div>
            <div class="overflow-y-auto p-4 flex-1"><table class="history-table"><thead><tr><th>日期</th><th>體重(差)</th><th>蛋白</th><th>碳水</th><th>廁所</th></tr></thead><tbody id="history-table-body"></tbody></table></div>
        </div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md rounded-t-[2.5rem] shadow-lg z-[100] pb-safe">
        <div class="max-w-md mx-auto flex justify-around p-4">
            <button onclick="switchPage('daily')" id="nav-daily" class="nav-item active flex flex-col items-center"><i class="fa-solid fa-calendar-check text-xl"></i><span class="text-[10px] mt-1 font-bold">每日紀錄</span></button>
            <button onclick="switchPage('inbody')" id="nav-inbody" class="nav-item flex flex-col items-center"><i class="fa-solid fa-weight-scale text-xl"></i><span class="text-[10px] mt-1 font-bold">InBody</span></button>
            <button onclick="switchPage('settings')" id="nav-settings" class="nav-item flex flex-col items-center"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] mt-1 font-bold">設置</span></button>
        </div>
    </footer>

    <script>
        function getLocalDateString(dateObj = new Date()) {
            const offset = dateObj.getTimezoneOffset() * 60000;
            return (new Date(dateObj - offset)).toISOString().split('T')[0];
        }

        let dailyDb = JSON.parse(localStorage.getItem('bear_daily_db') || '{}');
        let inbodyDb = JSON.parse(localStorage.getItem('bear_inbody_db') || '[]');
        let currentViewingDate = getLocalDateString();
        let myChart = null;

        function init() { 
            document.getElementById('date-picker').value = currentViewingDate;
            renderDateSlider(); 
            updateDailyUI(); 
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider'); 
            slider.innerHTML = '';
            
            // 產生前後 15 天的滑動條
            for (let i = -15; i <= 15; i++) {
                const d = new Date(currentViewingDate);
                d.setDate(d.getDate() + i);
                const ds = getLocalDateString(d);
                const active = (ds === currentViewingDate) ? 'active' : 'opacity-40';
                const hasData = dailyDb[ds] ? dailyDb[ds].weight : '--';
                const poopDot = (dailyDb[ds] && dailyDb[ds].poop) ? '<span class="text-[8px] text-blue-400">●</span>' : '';
                
                const item = document.createElement('div');
                item.className = `date-item text-center cursor-pointer ${active}`;
                item.id = `date-item-${ds}`;
                item.onclick = () => changeDate(ds);
                item.innerHTML = `<p class="text-[10px]">${d.getMonth()+1}/${d.getDate()}</p><p class="text-xs">${hasData}k</p><div class="h-3 flex items-center justify-center">${poopDot}</div>`;
                slider.appendChild(item);
            }
            // 自動置中滾動
            setTimeout(() => {
                const activeEl = document.getElementById(`date-item-${currentViewingDate}`);
                if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }, 100);
        }

        function changeDate(d) { 
            if(!d) return;
            currentViewingDate = d; 
            renderDateSlider(); 
            updateDailyUI(); 
        }

        function updateDailyUI() {
            const d = dailyDb[currentViewingDate] || { weight:'', pro:0, carb:0, content:'', poop: false };
            document.getElementById('view-weight').innerText = d.weight || '--';
            document.getElementById('view-pro').innerText = d.pro || 0;
            document.getElementById('view-carb').innerText = d.carb || 0;
            document.getElementById('view-content').innerText = d.content || '尚未紀錄內容...';
            const poopView = document.getElementById('view-poop');
            d.poop ? poopView.classList.remove('hidden') : poopView.classList.add('hidden');
            
            document.getElementById('in-weight').value = d.weight;
            document.getElementById('in-pro').value = d.pro || '';
            document.getElementById('in-carb').value = d.carb || '';
            document.getElementById('in-content').value = d.content || '';
            document.getElementById('in-poop').checked = d.poop || false;
            document.getElementById('date-picker').value = currentViewingDate;
        }

        // 折線圖邏輯
        function openChartModal() {
            openModal('chart-modal');
            const sortedDates = Object.keys(dailyDb).sort().slice(-14); // 取最近14筆
            const weights = sortedDates.map(d => parseFloat(dailyDb[d].weight) || null);
            
            if (myChart) myChart.destroy();
            const ctx = document.getElementById('weightChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: sortedDates.map(d => d.split('-').slice(1).join('/')),
                    datasets: [{
                        label: '體重 (kg)',
                        data: weights,
                        borderColor: '#2dd4bf',
                        backgroundColor: 'rgba(45, 212, 191, 0.1)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: false, grid: { display: false } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function switchPage(page) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById(`nav-${page}`).classList.add('active');
            
            document.getElementById('main-title').innerText = page === 'daily' ? '每日紀錄' : page === 'inbody' ? 'InBody' : '設置';
            document.getElementById('btn-chart').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-history').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-add-inbody').classList.toggle('hidden', page !== 'inbody');
            document.getElementById('cal-wrap').style.visibility = (page === 'settings') ? 'hidden' : 'visible';
            if(page === 'inbody') renderInBodyPage();
        }

        function saveDailyData() {
            dailyDb[currentViewingDate] = { 
                weight: document.getElementById('in-weight').value, 
                pro: document.getElementById('in-pro').value||0, 
                carb: document.getElementById('in-carb').value||0, 
                content: document.getElementById('in-content').value,
                poop: document.getElementById('in-poop').checked
            };
            localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb));
            renderDateSlider(); updateDailyUI(); alert('儲存成功 ✨');
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function handleHistoryBtn() { openModal('history-modal'); renderHistoryTable(); }

        // 其他功能 (InBody, Delete, Export...) 延續先前邏輯
        function renderHistoryTable() {
            const tbody = document.getElementById('history-table-body'); tbody.innerHTML = '';
            const dates = Object.keys(dailyDb).sort().reverse();
            dates.forEach((d) => {
                const cur = dailyDb[d];
                tbody.innerHTML += `<tr onclick="changeDate('${d}');closeModal('history-modal')">
                    <td class="text-gray-400">${d.split('-').slice(1).join('/')}</td>
                    <td class="font-bold">${cur.weight || '--'}</td>
                    <td class="text-blue-400">${cur.pro}g</td>
                    <td class="text-orange-300">${cur.carb}g</td>
                    <td>${cur.poop ? '🔵' : ''}</td>
                </tr>`;
            });
        }

        init();
    </script>
</body>
</html>
