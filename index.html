<!DOCTYPE html><html lang="zh-TW"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>健康能量紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bear-mint: #a3e4d7; --bear-soft-bg: #f4f9f9; --text-dark: #566573; }
        html, body { overscroll-behavior-y: auto; height: 100%; margin: 0; }
        body { background-color: var(--bear-soft-bg); color: var(--text-dark); font-family: -apple-system, sans-serif; padding-bottom: 100px; padding-top: env(safe-area-inset-top); }
        .macaron-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid white; box-shadow: 0 8px 20px rgba(163, 228, 215, 0.1); }
        .nav-item.active { color: #a3e4d7; }
        .nav-item { color: #aab7b7; transition: all 0.3s; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .input-bear { border: 1px solid var(--bear-mint); border-radius: 0.75rem; padding: 0.6rem; background: white; width: 100%; text-align: center; font-size: 0.9rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .diff-pos { color: #f87171; } .diff-neg { color: #34d399; }
        .inbody-label { font-size: 10px; color: #94a3b8; margin-bottom: 2px; display: block; font-weight: bold; }
        ::-webkit-scrollbar { display: none; }
        
        .calendar-wrapper { position: relative; width: 40px; height: 40px; }
        .calendar-wrapper input[type="date"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; z-index: 30; cursor: pointer; }
        .calendar-icon-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 9999px; background: white; display: flex; align-items: center; justify-content: center; color: #2dd4bf; box-shadow: 0 1px 2px rgba(0,0,0,0.05); z-index: 20; }
        
        #date-slider { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; display: flex; overflow-x: auto; gap: 0.8rem; padding: 1rem; scroll-snap-type: x mandatory; }
        .date-item { scroll-snap-align: center; flex: 0 0 52px; }
        
        .history-table { width: 100%; table-layout: fixed; font-size: 13px; border-collapse: collapse; }
        .history-table th, .history-table td { padding: 12px 1px; vertical-align: middle; border-bottom: 1px solid #f8fafc; text-align: center; }
        .history-table th { color: #94a3b8; font-weight: normal; font-size: 11px; }
        
        .cell-weight-container { display: flex; align-items: baseline; justify-content: center; gap: 4px; }
        .num-main { font-weight: bold; font-size: 14px; color: #475569; }
        .num-diff { font-size: 11px; font-weight: 700; min-width: 38px; text-align: left; }

        .chart-btn { padding: 4px 12px; border-radius: 8px; font-size: 12px; font-weight: bold; background: #f1f5f9; color: #94a3b8; }
        .chart-btn.active { background: #a3e4d7; color: white; }
    </style></head><body>

    <header class="flex justify-between items-center p-5 max-w-md mx-auto sticky top-0 bg-[#f4f9f9]/90 backdrop-blur-md z-[100]">
        <div class="calendar-wrapper" id="cal-wrap">
            <div class="calendar-icon-bg"><i class="fa-solid fa-calendar-alt"></i></div>
            <input type="date" id="date-picker" onchange="changeDate(this.value)">
        </div>
        <div id="title-container" onclick="handleTitleClick()" class="cursor-pointer">
            <h1 id="main-title" class="text-lg font-black text-slate-800 tracking-tight">每日紀錄</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="handleHistoryBtn()" id="btn-history" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-400 shadow-sm"><i class="fa-solid fa-list-ul"></i></button>
            <button onclick="openChart()" id="btn-chart" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-teal-400 shadow-sm"><i class="fa-solid fa-chart-line"></i></button>
            <button onclick="openModal('inbody-form-modal')" id="btn-add-inbody" class="hidden w-10 h-10 rounded-full bg-blue-400 flex items-center justify-center text-white shadow-sm font-bold text-xl">+</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-4">
        <div id="page-daily" class="tab-content active space-y-4">
            <div id="date-slider" class="macaron-card"></div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">體重 (kg)</p><p id="view-weight" class="text-2xl font-black text-teal-500">--</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">蛋白 (g)</p><p id="view-pro" class="text-2xl font-black text-blue-400">0</p></div>
                <div class="macaron-card p-4"><p class="text-[10px] text-gray-400">碳水 (g)</p><p id="view-carb" class="text-2xl font-black text-orange-300">0</p></div>
            </div>
            <div class="macaron-card p-5">
                <div id="view-poop" class="mb-2 hidden"><span class="bg-blue-50 text-blue-500 text-[10px] px-2 py-1 rounded-full font-bold">🔵 今日已有上廁所</span></div>
                <p id="view-content" class="text-sm text-gray-500 italic">點擊下方輸入紀錄...</p>
            </div>
            <div class="macaron-card p-6 space-y-4">
                <div class="grid grid-cols-3 gap-3">
                    <input id="in-weight" type="number" step="0.1" class="input-bear" placeholder="體重">
                    <input id="in-pro" type="number" class="input-bear" placeholder="蛋白">
                    <input id="in-carb" type="number" class="input-bear" placeholder="碳水">
                </div>
                <label class="flex items-center gap-2 text-sm font-bold text-slate-500 cursor-pointer"><input type="checkbox" id="in-poop" class="w-5 h-5 accent-teal-300"> 🚽 今日有上廁所</label>
                <textarea id="in-content" rows="2" class="input-bear text-left" placeholder="記錄飲食、心情..."></textarea>
                <div class="flex gap-2">
                    <button onclick="saveDailyData()" class="flex-1 bg-gradient-to-r from-teal-200 to-blue-200 text-white py-4 rounded-2xl font-bold shadow-sm">儲存數據</button>
                    <button onclick="deleteDailyData()" class="w-14 bg-red-50 text-red-300 rounded-2xl flex items-center justify-center"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
        </div>

        <div id="page-inbody" class="tab-content space-y-4">
            <div id="inbody-latest-view"></div>
            <div id="inbody-history-list" class="space-y-3 pb-10"></div>
        </div>

        <div id="page-settings" class="tab-content space-y-4 pt-4">
            <div class="macaron-card p-6 space-y-4">
                <button onclick="exportAllData()" class="w-full p-4 bg-teal-50 text-teal-700 rounded-xl font-bold flex justify-between"><span>備份匯出 (.json)</span><i class="fa-solid fa-download"></i></button>
                <button onclick="document.getElementById('import-file').click()" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold flex justify-between"><span>還原匯入</span><i class="fa-solid fa-upload"></i></button>
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importAllData(event)">
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md rounded-t-[2.5rem] shadow-lg z-[100] pb-safe">
        <div class="max-w-md mx-auto flex justify-around p-4">
            <button onclick="switchPage('daily')" id="nav-daily" class="nav-item active flex flex-col items-center"><i class="fa-solid fa-calendar-check text-xl"></i><span class="text-[10px] mt-1 font-bold">紀錄</span></button>
            <button onclick="switchPage('inbody')" id="nav-inbody" class="nav-item flex flex-col items-center"><i class="fa-solid fa-weight-scale text-xl"></i><span class="text-[10px] mt-1 font-bold">InBody</span></button>
            <button onclick="switchPage('settings')" id="nav-settings" class="nav-item flex flex-col items-center"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] mt-1 font-bold">設置</span></button>
        </div>
    </footer>

    <div id="chart-modal" class="modal">
        <div class="bg-white w-full max-w-md h-[75vh] rounded-t-[2rem] p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-teal-500">體重趨勢分析</h3><button onclick="closeModal('chart-modal')" class="text-2xl text-gray-300">&times;</button></div>
            <div class="flex justify-center gap-2 mb-6">
                <button onclick="updateChartRange('week')" class="chart-btn active" data-range="week">週</button>
                <button onclick="updateChartRange('month')" class="chart-btn" data-range="month">月</button>
                <button onclick="updateChartRange('year')" class="chart-btn" data-range="year">年</button>
                <button onclick="updateChartRange('all')" class="chart-btn" data-range="all">全部</button>
            </div>
            <div class="flex-1 min-h-0"><canvas id="weightChart"></canvas></div>
        </div>
    </div>

    <div id="history-modal" class="modal items-end">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center"><h3 class="font-bold text-teal-600">紀錄歷史清單</h3><button onclick="closeModal('history-modal')" class="text-gray-300 text-2xl">&times;</button></div>
            <div class="overflow-y-auto p-1 flex-1">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">日期</th>
                            <th style="width: 40%;">體重 (差)</th>
                            <th style="width: 15%;">蛋白</th>
                            <th style="width: 15%;">碳水</th>
                            <th style="width: 15%;">🚽</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="inbody-form-modal" class="modal">
        <div class="bg-white w-full max-w-md h-[90vh] rounded-t-[2rem] p-6 overflow-y-auto">
            <div class="flex justify-between items-center mb-6"><h3 class="font-bold text-xl text-blue-500">新增 InBody 報告</h3><button onclick="closeModal('inbody-form-modal')" class="text-2xl text-gray-300">&times;</button></div>
            <div class="grid grid-cols-2 gap-4 pb-10">
                <div class="col-span-2"><label class="inbody-label">測量日期</label><input id="f-date" type="date" class="input-bear"></div>
                <div><label class="inbody-label">體重 (kg)</label><input id="f-weight" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">骨骼肌 (kg)</label><input id="f-muscle" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">體脂重 (kg)</label><input id="f-fat-kg" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">BMI</label><input id="f-bmi" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">體脂率 (%)</label><input id="f-fat-p" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">腰臀比 (WHR)</label><input id="f-whr" type="number" step="0.01" class="input-bear"></div>
                <div><label class="inbody-label">水分比 (%)</label><input id="f-moist" type="number" step="0.1" class="input-bear"></div>
                <div><label class="inbody-label">內臟脂肪</label><input id="f-visceral" type="number" class="input-bear"></div>
                <div><label class="inbody-label">基礎代謝 (kcal)</label><input id="f-bmr" type="number" class="input-bear"></div>
                <div><label class="inbody-label">身體評分</label><input id="f-score" type="number" class="input-bear"></div>
                <div class="col-span-2 mt-4"><button onclick="submitInBody()" class="w-full bg-blue-400 text-white py-4 rounded-2xl font-bold">儲存數據</button></div>
            </div>
        </div>
    </div>

    <div id="inbody-detail-modal" class="modal" onclick="closeModal('inbody-detail-modal')">
        <div class="bg-white w-11/12 max-w-sm rounded-[2rem] p-6 space-y-4" onclick="event.stopPropagation()">
            <div id="inbody-detail-content"></div>
            <button onclick="closeModal('inbody-detail-modal')" class="w-full py-3 bg-gray-100 text-gray-400 rounded-xl font-bold">關閉</button>
        </div>
    </div>

    <script>
        function getLocalDateString(d = new Date()) { const offset = d.getTimezoneOffset() * 60000; return (new Date(d - offset)).toISOString().split('T')[0]; }
        let dailyDb = JSON.parse(localStorage.getItem('bear_daily_db') || '{}');
        let inbodyDb = JSON.parse(localStorage.getItem('bear_inbody_db') || '[]');
        let currentViewingDate = getLocalDateString();
        let currentPage = 'daily';
        let weightChart = null;

        function init() { 
            currentViewingDate = getLocalDateString();
            document.getElementById('date-picker').value = currentViewingDate; 
            renderDateSlider(); 
            updateDailyUI(); 
        }

        function handleTitleClick() { if(currentPage === 'daily') changeDate(getLocalDateString()); }

        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`page-${page}`).classList.add('active');
            document.getElementById(`nav-${page}`).classList.add('active');
            if(page === 'daily') {
                currentViewingDate = getLocalDateString();
                updateDailyUI();
            } else {
                document.getElementById('main-title').innerText = (page === 'inbody') ? 'InBody' : '設置';
            }
            document.getElementById('cal-wrap').style.visibility = (page === 'settings') ? 'hidden' : 'visible';
            document.getElementById('btn-history').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-chart').classList.toggle('hidden', page !== 'daily');
            document.getElementById('btn-add-inbody').classList.toggle('hidden', page !== 'inbody');
            if(page === 'inbody') renderInBodyPage();
        }

        function changeDate(d) {
            currentViewingDate = d;
            renderDateSlider();
            updateDailyUI();
            setTimeout(() => {
                const active = document.querySelector('.date-active');
                if(active) active.scrollIntoView({ behavior:'smooth', inline:'center' });
            }, 100);
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider'); slider.innerHTML = '';
            for (let i=-15; i<=15; i++) {
                const d = new Date(currentViewingDate); d.setDate(d.getDate()+i);
                const ds = getLocalDateString(d);
                const isActive = (ds === currentViewingDate) ? 'date-active !opacity-100 scale-110 font-black text-teal-500' : '';
                slider.innerHTML += `<button onclick="changeDate('${ds}')" class="date-item flex-shrink-0 text-center opacity-40 transition-all ${isActive}"><p class="text-[10px]">${d.getMonth()+1}/${d.getDate()}</p><p class="text-xs font-bold">${dailyDb[ds]?.weight || '--'}</p><div class="h-1 w-1 mx-auto mt-1 rounded-full ${dailyDb[ds]?.poop ? 'bg-blue-400' : ''}"></div></button>`;
            }
        }

        function updateDailyUI() {
            if(currentPage !== 'daily') return;
            document.getElementById('main-title').innerText = "每日紀錄";
            const d = dailyDb[currentViewingDate] || { weight:'', pro:0, carb:0, content:'', poop: false };
            document.getElementById('view-weight').innerText = d.weight || '--';
            document.getElementById('view-pro').innerText = d.pro || 0;
            document.getElementById('view-carb').innerText = d.carb || 0;
            document.getElementById('view-content').innerText = d.content || '點擊下方輸入紀錄...';
            d.poop ? document.getElementById('view-poop').classList.remove('hidden') : document.getElementById('view-poop').classList.add('hidden');
            document.getElementById('in-weight').value = d.weight;
            document.getElementById('in-pro').value = d.pro || '';
            document.getElementById('in-carb').value = d.carb || '';
            document.getElementById('in-content').value = d.content || '';
            document.getElementById('in-poop').checked = d.poop;
            document.getElementById('date-picker').value = currentViewingDate;
        }

        function saveDailyData() {
            dailyDb[currentViewingDate] = { weight: document.getElementById('in-weight').value, pro: document.getElementById('in-pro').value||0, carb: document.getElementById('in-carb').value||0, content: document.getElementById('in-content').value, poop: document.getElementById('in-poop').checked };
            localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb)); renderDateSlider(); updateDailyUI();
        }

        function deleteDailyData() { if(confirm('確定清空？')){ delete dailyDb[currentViewingDate]; localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb)); renderDateSlider(); updateDailyUI(); } }

        function openChart() { openModal('chart-modal'); updateChartRange('week'); }
        
        function updateChartRange(range) {
            document.querySelectorAll('.chart-btn').forEach(b => b.classList.toggle('active', b.dataset.range === range));
            const allDates = Object.keys(dailyDb).sort();
            const now = new Date();
            let filteredDates = [];
            if(range === 'week') {
                const day = now.getDay() || 7;
                const monday = new Date(now);
                monday.setDate(now.getDate() - day + 1); monday.setHours(0,0,0,0);
                const sunday = new Date(monday);
                sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59,999);
                filteredDates = allDates.filter(d => { const dt = new Date(d); return dt >= monday && dt <= sunday; });
            } else if(range === 'month') {
                const currentMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
                filteredDates = allDates.filter(d => d.startsWith(currentMonth));
            } else if(range === 'year') {
                const currentYear = `${now.getFullYear()}`;
                filteredDates = allDates.filter(d => d.startsWith(currentYear));
            } else { filteredDates = allDates; }
            const weights = filteredDates.map(d => dailyDb[d].weight);
            if(weightChart) weightChart.destroy();
            weightChart = new Chart(document.getElementById('weightChart'), {
                type: 'line',
                data: { labels: filteredDates.map(d => d.slice(5).replace('-','/')), datasets: [{ label: '體重', data: weights, borderColor: '#a3e4d7', tension: 0.3, fill: true, backgroundColor: 'rgba(163, 228, 215, 0.1)' }]},
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function handleHistoryBtn() {
            openModal('history-modal');
            const tbody = document.getElementById('history-table-body');
            const dates = Object.keys(dailyDb).sort();
            tbody.innerHTML = dates.slice().reverse().map(d => {
                const cur = dailyDb[d]; const curIdx = dates.indexOf(d); let diff = "";
                if(curIdx > 0 && dailyDb[dates[curIdx-1]].weight && cur.weight) {
                    const df = (cur.weight - dailyDb[dates[curIdx-1]].weight).toFixed(1);
                    diff = `<span class="${df>0?'diff-pos':'diff-neg'} num-diff">${df>0?'+':''}${df}</span>`;
                }
                return `<tr onclick="changeDate('${d}');closeModal('history-modal')">
                    <td>${d.slice(5).replace('-','/')}</td>
                    <td><div class="cell-weight-container"><span class="num-main">${cur.weight||'--'}</span>${diff}</div></td>
                    <td>${cur.pro}g</td>
                    <td>${cur.carb}g</td>
                    <td>${cur.poop?'🔵':''}</td>
                </tr>`;
            }).join('');
        }

        function submitInBody() {
            const data = { 
                id: Date.now(), 
                date: document.getElementById('f-date').value, 
                weight: parseFloat(document.getElementById('f-weight').value)||0, 
                muscle: parseFloat(document.getElementById('f-muscle').value)||0,
                fatKg: parseFloat(document.getElementById('f-fat-kg').value)||0,
                bmi: parseFloat(document.getElementById('f-bmi').value)||0,
                fatP: parseFloat(document.getElementById('f-fat-p').value)||0,
                whr: parseFloat(document.getElementById('f-whr').value)||0,
                moist: parseFloat(document.getElementById('f-moist').value)||0,
                visceral: parseInt(document.getElementById('f-visceral').value)||0,
                bmr: parseInt(document.getElementById('f-bmr').value)||0,
                score: parseInt(document.getElementById('f-score').value)||0 
            };
            inbodyDb.unshift(data); inbodyDb.sort((a,b) => b.date.localeCompare(a.date));
            localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); closeModal('inbody-form-modal'); renderInBodyPage();
        }

        // 補回 InBody 差值計算邏輯
        function getInBodyDiff(v, pv, goodDown = true) {
            if(!pv) return "";
            const df = (v - pv).toFixed(1);
            if(df == 0) return "";
            const isGood = (df > 0 !== goodDown);
            return `<span class="${isGood?'text-emerald-400':'text-rose-400'} text-[10px] ml-1">${df>0?'↑':'↓'}${Math.abs(df)}</span>`;
        }

        function renderInBodyPage() {
            const latestArea = document.getElementById('inbody-latest-view');
            const historyList = document.getElementById('inbody-history-list');
            if(!inbodyDb.length) { latestArea.innerHTML = '<div class="macaron-card p-10 text-center text-gray-400">尚無資料</div>'; return; }
            const latest = inbodyDb[0]; const prev = inbodyDb[1];
            latestArea.innerHTML = `<div class="macaron-card p-6 border-t-8 border-t-blue-200" onclick="viewInBodyDetail(${latest.id})">
                <div class="flex justify-between items-center mb-4"><span class="font-black text-slate-700">${latest.date}</span><span class="text-blue-500 font-bold">評分 ${latest.score}${getInBodyDiff(latest.score, prev?.score, false)}</span></div>
                <div class="grid grid-cols-2 gap-4 text-center">
                    <div class="bg-slate-50 p-2 rounded-xl"><p class="inbody-label">體重</p><p class="font-black">${latest.weight}kg${getInBodyDiff(latest.weight, prev?.weight)}</p></div>
                    <div class="bg-slate-50 p-2 rounded-xl"><p class="inbody-label">骨骼肌</p><p class="font-black">${latest.muscle}kg${getInBodyDiff(latest.muscle, prev?.muscle, false)}</p></div>
                    <div class="bg-slate-50 p-2 rounded-xl"><p class="inbody-label">體脂率</p><p class="font-black">${latest.fatP}%${getInBodyDiff(latest.fatP, prev?.fatP)}</p></div>
                    <div class="bg-slate-50 p-2 rounded-xl"><p class="inbody-label">內臟脂肪</p><p class="font-black">${latest.visceral}${getInBodyDiff(latest.visceral, prev?.visceral)}</p></div>
                </div>
            </div>`;
            historyList.innerHTML = inbodyDb.map((i, idx) => {
                const p = inbodyDb[idx+1];
                return `<div class="macaron-card p-4 flex justify-between items-center" onclick="viewInBodyDetail(${i.id})"><div><p class="font-bold text-sm">${i.date}</p><p class="text-[10px] text-gray-400">體重 ${i.weight}${getInBodyDiff(i.weight, p?.weight)} / 評分 ${i.score}</p></div><button onclick="deleteInBody(${i.id}, event)" class="text-red-100 p-2"><i class="fa-solid fa-trash-can"></i></button></div>`;
            }).join('');
        }

        function viewInBodyDetail(id) {
            const it = inbodyDb.find(i => i.id === id); if(!it) return;
            document.getElementById('inbody-detail-content').innerHTML = `<h3 class="text-center font-black mb-4">${it.date} 完整報告</h3><div class="grid grid-cols-2 gap-2 text-xs">
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體重</span>${it.weight} kg</div>
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">骨骼肌</span>${it.muscle} kg</div>
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體脂重</span>${it.fatKg} kg</div>
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">體脂率</span>${it.fatP} %</div>
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">BMI</span>${it.bmi}</div>
                <div class="bg-gray-50 p-2 rounded-lg"><span class="inbody-label">內臟脂肪</span>${it.visceral}</div>
                <div class="col-span-2 bg-blue-50 p-3 rounded-lg text-center font-bold text-blue-600"><span class="inbody-label">身體評分</span>${it.score} 分</div>
            </div>`;
            openModal('inbody-detail-modal');
        }

        function deleteInBody(id, e) { e.stopPropagation(); if(confirm('刪除紀錄？')){ inbodyDb = inbodyDb.filter(i => i.id !== id); localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); renderInBodyPage(); } }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function exportAllData() { const blob = new Blob([JSON.stringify({daily:dailyDb, inbody:inbodyDb})], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `健康備份.json`; a.click(); }
        function importAllData(e) { const r = new FileReader(); r.onload = (ev) => { const d = JSON.parse(ev.target.result); dailyDb=d.daily; inbodyDb=d.inbody; localStorage.setItem('bear_daily_db', JSON.stringify(dailyDb)); localStorage.setItem('bear_inbody_db', JSON.stringify(inbodyDb)); location.reload(); }; r.readAsText(e.target.files[0]); }
        init();
    </script>
</body></html>
