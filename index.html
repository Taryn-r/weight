<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>健康紀錄表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-start: #e0f7f8; --bg-end: #fffefe; }
        body { 
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: #444; font-family: "PingFang TC", sans-serif; 
            padding-bottom: 110px; min-height: 100vh; background-attachment: fixed;
        }
        /* 視覺膠囊 */
        .capsule-container { min-width: 62px; height: 115px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; cursor: pointer; }
        .capsule-bg { width: 44px; height: 78px; background: rgba(255,255,255,0.7); border-radius: 22px; position: relative; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); }
        .capsule-fill { position: absolute; bottom: 0; left: 0; right: 0; transition: height 0.5s ease; }
        .active-ring { border: 3px solid #ff9f43 !important; background: white; box-shadow: 0 4px 12px rgba(255,159,67,0.2); }
        
        /* 透明卡片 */
        .macaron-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 2.5rem; box-shadow: 0 10px 30px rgba(163,228,215,0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-primary { background: linear-gradient(135deg, #a3e4d7 0%, #85c1e9 100%); color: white; }
        .btn-danger { background: rgba(255, 182, 193, 0.4); color: #ff6b6b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; backdrop-filter: blur(8px); }
        
        /* 圓形按鈕統一風格 */
        .round-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.6); display: flex; align-items: center; justify-content: center; border: 1px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); color: #777; transition: all 0.2s; }
        .round-btn:active { transform: scale(0.9); background: white; }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex items-center justify-between relative z-10">
            <button onclick="document.getElementById('date-picker').showPicker()" class="round-btn text-teal-600">
                <i class="fa-solid fa-calendar-day"></i>
            </button>

            <div class="text-center flex flex-col items-center">
                <h1 id="display-title" class="text-xl font-black text-gray-700 tracking-tight">今天</h1>
                <div class="w-4 h-1 bg-orange-400 rounded-full mt-1 opacity-60"></div>
            </div>

            <div class="flex space-x-2">
                <button onclick="toggleChart()" class="round-btn text-blue-400"><i class="fa-solid fa-chart-line"></i></button>
                <button onclick="toggleHistory()" class="round-btn text-teal-500"><i class="fa-solid fa-list-ul"></i></button>
                <button onclick="toggleSettings()" class="round-btn text-gray-400"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>

        <div id="date-slider" class="flex overflow-x-auto space-x-2 no-scrollbar max-w-md mx-auto py-4 relative z-10 mt-2"></div>
    </header>

    <main class="max-w-md mx-auto px-4 space-y-6 relative z-10">
        <div class="macaron-card p-8 flex justify-around items-center">
            <div class="text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Weight</p>
                <p id="v-w" class="text-4xl font-black text-teal-600">--</p>
            </div>
            <div class="text-center border-x border-gray-100/50 px-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Protein</p>
                <p id="v-p" class="text-4xl font-black text-blue-500">0</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Carb</p>
                <p id="v-c" class="text-4xl font-black text-orange-400">0</p>
            </div>
        </div>

        <div class="macaron-card p-8 space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-teal-700">體重 (kg)</label>
                    <input id="i-w" type="number" step="0.1" class="w-full p-4 text-center bg-white/40 rounded-2xl outline-none font-black text-xl border border-white/50" placeholder="0.0">
                </div>
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-blue-600">蛋白 (g)</label>
                    <input id="i-p" type="number" class="w-full p-4 text-center bg-white/40 rounded-2xl outline-none font-black text-xl border border-white/50" placeholder="0">
                </div>
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-orange-500">碳水 (g)</label>
                    <input id="i-c" type="number" class="w-full p-4 text-center bg-white/40 rounded-2xl outline-none font-black text-xl border border-white/50" placeholder="0">
                </div>
            </div>
            <textarea id="i-content" rows="2" class="w-full p-4 bg-white/40 rounded-2xl outline-none text-sm italic border border-white/50" placeholder="寫下今天的筆記..."></textarea>
            
            <div class="space-y-3 pt-2">
                <button onclick="saveData()" class="btn-primary w-full py-4 rounded-[1.5rem] font-bold text-lg shadow-lg active:scale-95 transition-all">儲存今日進度</button>
                <button onclick="deleteData()" class="btn-danger w-full py-3 rounded-[1.5rem] font-bold text-sm opacity-50">刪除此日紀錄</button>
            </div>
        </div>
    </main>

    <div id="history-modal" class="modal items-end justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-md rounded-[2.5rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center"><h3 class="font-black text-2xl text-teal-700">歷史數據</h3><button onclick="toggleHistory()" class="text-3xl text-gray-300">&times;</button></div>
            <div class="overflow-y-auto p-5 flex-1"><table class="w-full text-center"><thead class="text-xs text-gray-400 border-b"><tr><th class="py-4">日期</th><th class="py-4">體重</th><th class="py-4">差距</th><th class="py-4 text-blue-400">P/C</th></tr></thead><tbody id="history-table-body" class="divide-y divide-gray-50/50"></tbody></table></div>
        </div>
    </div>

    <div id="chart-modal" class="modal items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl"><div class="flex justify-between items-center mb-6"><h3 class="font-black text-xl text-blue-600">最近趨勢</h3><button onclick="toggleChart()" class="text-3xl text-gray-300">&times;</button></div><div class="h-64"><canvas id="weightChart"></canvas></div></div>
    </div>

    <div id="settings-modal" class="modal items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6"><h3 class="font-black text-xl text-gray-700">資料備份</h3><button onclick="toggleSettings()" class="text-3xl text-gray-300">&times;</button></div>
            <div class="space-y-3">
                <button onclick="exportJSON()" class="w-full py-4 bg-white/50 border border-white rounded-2xl font-bold text-gray-600 flex items-center justify-center gap-2"><i class="fa-solid fa-file-export text-blue-400"></i> 匯出備份 (JSON)</button>
                <button onclick="exportCSV()" class="w-full py-4 bg-white/50 border border-white rounded-2xl font-bold text-gray-600 flex items-center justify-center gap-2"><i class="fa-solid fa-file-csv text-teal-500"></i> 匯出報表 (CSV)</button>
                <hr class="my-2 border-gray-100">
                <button onclick="document.getElementById('importFile').click()" class="w-full py-4 bg-teal-50 text-teal-600 rounded-2xl font-bold flex items-center justify-center gap-2"><i class="fa-solid fa-file-import"></i> 匯入資料</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(this)">
            </div>
        </div>
    </div>

    <nav class="bottom-nav max-w-md mx-auto">
        <button class="text-teal-600 flex flex-col items-center"><i class="fa-solid fa-note-sticky text-2xl"></i><span class="text-[10px] mt-1.5 font-bold">紀錄</span></button>
        <button class="text-gray-300 flex flex-col items-center opacity-60"><i class="fa-solid fa-dna text-2xl"></i><span class="text-[10px] mt-1.5 font-bold">InBody</span></button>
    </nav>

    <input type="date" id="date-picker" class="hidden" onchange="setDate(this.value)">

    <script>
        let db = JSON.parse(localStorage.getItem('health_master_v4_center') || '{}');
        let selectedDate = new Date().toISOString().split('T')[0];
        let myChart = null;

        function setDate(date) { selectedDate = date; updateUI(); }

        function updateUI() {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('display-title').innerText = (selectedDate === todayStr) ? "今天" : selectedDate.replace(/-/g, '/');
            renderDateSlider();
            const data = db[selectedDate] || { w: '', p: '', c: '', content: '' };
            document.getElementById('v-w').innerText = data.w || '--';
            document.getElementById('v-p').innerText = data.p || '0';
            document.getElementById('v-c').innerText = data.c || '0';
            document.getElementById('i-w').value = data.w || '';
            document.getElementById('i-p').value = data.p || '';
            document.getElementById('i-c').value = data.c || '';
            document.getElementById('i-content').value = data.content || '';
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider'); slider.innerHTML = '';
            for(let i = -3; i <= 3; i++) {
                let d = new Date(selectedDate); d.setDate(d.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let weight = db[dateStr]?.w || '';
                let isActive = dateStr === selectedDate ? 'active-ring' : '';
                let prevD = new Date(d); prevD.setDate(d.getDate() - 1);
                let prevW = db[prevD.toISOString().split('T')[0]]?.w;
                let fillColor = "bg-gray-100", symbol = "";
                if (weight && prevW) {
                    fillColor = parseFloat(weight) <= parseFloat(prevW) ? "bg-[#d1f2eb]" : "bg-[#fbeee0]";
                    symbol = parseFloat(weight) <= parseFloat(prevW) ? "-" : "↑";
                } else if (weight) { fillColor = "bg-[#d1f2eb]"; }
                slider.innerHTML += `
                    <div onclick="setDate('${dateStr}')" class="capsule-container">
                        <div class="text-[10px] text-gray-400 mb-1.5 font-bold">${weight}</div>
                        <div class="capsule-bg ${isActive}"><div class="capsule-fill ${fillColor} flex items-center justify-center text-[10px] font-bold text-white" style="height: ${weight ? '65%' : '0%'}">${symbol}</div></div>
                        <div class="text-sm mt-2.5 font-black ${dateStr === selectedDate ? 'text-orange-500' : 'text-gray-400'}">${d.getDate()}</div>
                    </div>`;
            }
        }

        function saveData() {
            db[selectedDate] = { w: document.getElementById('i-w').value, p: document.getElementById('i-p').value || 0, c: document.getElementById('i-c').value || 0, content: document.getElementById('i-content').value };
            localStorage.setItem('health_master_v4_center', JSON.stringify(db));
            updateUI(); alert('✨ 儲存成功');
        }

        function deleteData() { if(confirm('刪除這天紀錄？')) { delete db[selectedDate]; localStorage.setItem('health_master_v4_center', JSON.stringify(db)); updateUI(); } }
        function toggleHistory() { document.getElementById('history-modal').style.display = (document.getElementById('history-modal').style.display === 'flex') ? 'none' : 'flex'; renderHistoryTable(); }
        function toggleChart() { document.getElementById('chart-modal').style.display = (document.getElementById('chart-modal').style.display === 'flex') ? 'none' : 'flex'; renderChart(); }
        function toggleSettings() { document.getElementById('settings-modal').style.display = (document.getElementById('settings-modal').style.display === 'flex') ? 'none' : 'flex'; }
        
        function exportJSON() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const link = document.createElement('a'); link.href = dataStr; link.download = "health_backup.json"; link.click(); }
        function exportCSV() { let csv = "日期,體重,P,C\n"; Object.keys(db).forEach(k => { csv += `${k},${db[k].w},${db[k].p},${db[k].c}\n`; }); const blob = new Blob(["\ufeff"+csv], {type:'text/csv'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download="health.csv"; a.click(); }
        function importJSON(input) { const reader = new FileReader(); reader.onload = (e) => { db = {...db, ...JSON.parse(e.target.result)}; localStorage.setItem('health_master_v4_center', JSON.stringify(db)); updateUI(); alert('匯入成功'); }; reader.readAsText(input.files[0]); }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-table-body'); tbody.innerHTML = '';
            Object.keys(db).sort().reverse().forEach(date => {
                const cur = db[date];
                tbody.innerHTML += `<tr><td class="py-5 text-gray-400 text-xs">${date.substring(5)}</td><td class="py-5 font-black text-xl text-gray-700">${cur.w}</td><td class="py-5 text-gray-300">--</td><td class="py-5 font-bold text-blue-400">${cur.p}/${cur.c}</td></tr>`;
            });
        }
        function renderChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            const dates = Object.keys(db).sort().slice(-7);
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line', data: { labels: dates.map(d => d.substring(5)), datasets: [{ data: dates.map(d => db[d].w), borderColor: '#85c1e9', tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
        updateUI();
    </script>
</body>
</html>
