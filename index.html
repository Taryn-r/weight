<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>我的溫柔紀錄空間</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --mint: #d1f2eb; --blue: #d6eaf8; --text: #566573; --accent: #a3e4d7; --bg-soft: #f0f9f9; }
        body { 
            background: linear-gradient(135deg, var(--bg-soft) 0%, #ffffff 100%);
            color: var(--text); 
            font-family: "PingFang TC", sans-serif; 
            padding-bottom: 90px;
            min-height: 100vh;
        }
        .macaron-card { 
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 2rem; 
            box-shadow: 0 8px 20px rgba(163, 228, 215, 0.2); 
        }
        .date-item { min-width: 65px; transition: all 0.2s; border: 1px solid transparent; }
        .date-active { background: white; border-radius: 1.2rem; color: #148f77; font-weight: bold; border-color: var(--mint); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .input-box {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid var(--mint-green);
            border-radius: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #a3e4d7 0%, #85c1e9 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(163, 228, 215, 0.4);
        }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-around; padding: 12px 0; z-index: 100; border-radius: 2rem 2rem 0 0; }
        .tab-active { color: #5dade2; font-weight: bold; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(214, 234, 248, 0.6); z-index: 200; backdrop-filter: blur(4px); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="p-4 sticky top-0 bg-white/70 backdrop-blur-md z-50">
        <div class="flex justify-between items-center mb-4 max-w-md mx-auto">
            <button onclick="document.getElementById('date-picker').showPicker()" class="text-teal-400 text-xl"><i class="fa-solid fa-calendar-alt"></i></button>
            <span class="font-bold text-teal-600 tracking-widest">健康紀錄表</span>
            <button onclick="toggleHistory()" class="text-blue-400 text-xl"><i class="fa-solid fa-list-check"></i></button>
        </div>
        <div id="date-slider" class="flex overflow-x-auto space-x-2 no-scrollbar max-w-md mx-auto pb-2">
            </div>
    </header>

    <main id="tab-daily" class="max-w-md mx-auto px-4 mt-2 space-y-6">
        <div class="macaron-card p-6 flex justify-around items-center">
            <div class="text-center">
                <p class="text-[10px] uppercase text-gray-400 mb-1">Weight</p>
                <p id="v-w" class="text-2xl font-black text-teal-500">--</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-gray-400 mb-1">Protein</p>
                <p id="v-p" class="text-2xl font-black text-blue-400">0</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-gray-400 mb-1">Carb</p>
                <p id="v-c" class="text-2xl font-black text-orange-300">0</p>
            </div>
        </div>

        <div class="macaron-card p-6 space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div class="space-y-1 text-center">
                    <label class="text-[10px] text-teal-600 font-bold">體重 (kg)</label>
                    <input id="i-w" type="number" step="0.1" class="w-full p-3 text-center border-2 border-[#d1f2eb] rounded-2xl focus:outline-none focus:border-blue-300" placeholder="0.0">
                </div>
                <div class="space-y-1 text-center">
                    <label class="text-[10px] text-blue-500 font-bold">蛋白質 (g)</label>
                    <input id="i-p" type="number" class="w-full p-3 text-center border-2 border-[#d1f2eb] rounded-2xl focus:outline-none focus:border-blue-300" placeholder="0">
                </div>
                <div class="space-y-1 text-center">
                    <label class="text-[10px] text-orange-400 font-bold">碳水 (g)</label>
                    <input id="i-c" type="number" class="w-full p-3 text-center border-2 border-[#d1f2eb] rounded-2xl focus:outline-none focus:border-blue-300" placeholder="0">
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-[10px] text-gray-400 ml-2 font-bold uppercase">Meals Content</label>
                <textarea id="i-content" rows="3" class="w-full p-4 text-sm bg-white/50 border-2 border-[#d1f2eb] rounded-2xl focus:outline-none focus:border-blue-300" placeholder="今天記錄了什麼進食內容？"></textarea>
            </div>
            <button onclick="saveData()" class="btn-primary w-full py-4 rounded-2xl font-bold tracking-widest active:scale-95 transition-all">
                儲存今日進度
            </button>
        </div>

        <div class="px-6 pb-4">
            <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Notes</p>
            <p id="v-content" class="text-sm text-gray-500 italic leading-relaxed">尚未留下筆記...</p>
        </div>
    </main>

    <main id="tab-inbody" class="max-w-md mx-auto px-4 mt-2 hidden">
        <div class="macaron-card p-8 text-center space-y-6">
            <h2 class="text-xl font-bold text-blue-400 tracking-widest">INBODY 數據紀錄</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-4 bg-blue-50/50 rounded-2xl">
                    <span class="text-sm text-blue-500">骨骼肌重量 (kg)</span>
                    <input type="number" class="bg-transparent text-right font-bold w-20 outline-none" placeholder="0.0">
                </div>
                <div class="flex justify-between items-center p-4 bg-pink-50/50 rounded-2xl">
                    <span class="text-sm text-pink-400">體脂肪率 (%)</span>
                    <input type="number" class="bg-transparent text-right font-bold w-20 outline-none" placeholder="0.0">
                </div>
                <div class="flex justify-between items-center p-4 bg-teal-50/50 rounded-2xl">
                    <span class="text-sm text-teal-500">基礎代謝率 (kcal)</span>
                    <input type="number" class="bg-transparent text-right font-bold w-20 outline-none" placeholder="0">
                </div>
            </div>
            <button class="btn-primary w-full py-4 rounded-2xl font-bold">儲存 InBody 數據</button>
        </div>
    </main>

    <div id="history-modal" class="modal items-end sm:items-center justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[3rem] sm:rounded-[3rem] max-h-[85vh] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-8 border-b border-gray-50 flex justify-between items-center sticky top-0 bg-white/80 backdrop-blur-md">
                <h3 class="font-bold text-xl text-teal-600">數據月報表</h3>
                <button onclick="toggleHistory()" class="w-8 h-8 rounded-full bg-gray-50 text-gray-400 flex items-center justify-center">&times;</button>
            </div>
            <div class="overflow-y-auto p-6 flex-1">
                <table class="w-full text-xs text-left">
                    <thead class="text-gray-300 uppercase tracking-widest border-b">
                        <tr>
                            <th class="pb-4 font-normal">日期</th>
                            <th class="pb-4 font-normal">體重 (差距)</th>
                            <th class="pb-4 font-normal">P / C</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body" class="divide-y divide-gray-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <nav class="bottom-nav max-w-md mx-auto">
        <button onclick="switchTab('daily')" id="btn-daily" class="tab-active flex flex-col items-center">
            <i class="fa-solid fa-note-sticky text-xl"></i>
            <span class="text-[10px] mt-1">每日紀錄</span>
        </button>
        <button onclick="switchTab('inbody')" id="btn-inbody" class="text-gray-300 flex flex-col items-center">
            <i class="fa-solid fa-person-rays text-xl"></i>
            <span class="text-[10px] mt-1">InBody</span>
        </button>
    </nav>

    <input type="date" id="date-picker" class="hidden" onchange="setDate(this.value)">

    <script>
        let db = JSON.parse(localStorage.getItem('health_v3_db') || '{}');
        let selectedDate = new Date().toISOString().split('T')[0];

        function setDate(date) { selectedDate = date; updateUI(); }

        function switchTab(tab) {
            document.getElementById('tab-daily').classList.toggle('hidden', tab !== 'daily');
            document.getElementById('tab-inbody').classList.toggle('hidden', tab !== 'inbody');
            document.getElementById('btn-daily').classList.toggle('tab-active', tab === 'daily');
            document.getElementById('btn-inbody').classList.toggle('tab-active', tab === 'inbody');
            document.getElementById('btn-daily').classList.toggle('text-gray-300', tab !== 'daily');
            document.getElementById('btn-inbody').classList.toggle('text-gray-300', tab !== 'inbody');
        }

        function updateUI() {
            renderDateSlider();
            const data = db[selectedDate] || { w: '', p: '', c: '', content: '' };
            document.getElementById('v-w').innerText = data.w || '--';
            document.getElementById('v-p').innerText = data.p || '0';
            document.getElementById('v-c').innerText = data.c || '0';
            document.getElementById('v-content').innerText = data.content || '尚未填寫進食內容...';
            
            document.getElementById('i-w').value = data.w;
            document.getElementById('i-p').value = data.p;
            document.getElementById('i-c').value = data.c;
            document.getElementById('i-content').value = data.content || '';
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider');
            slider.innerHTML = '';
            for(let i = -2; i <= 2; i++) {
                let d = new Date(selectedDate);
                d.setDate(d.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let weight = db[dateStr]?.w || '--';
                let isActive = i === 0 ? 'date-active' : 'opacity-40';
                slider.innerHTML += `
                    <div onclick="setDate('${dateStr}')" class="date-item p-3 text-center cursor-pointer ${isActive}">
                        <div class="text-[9px] mb-1 font-bold">${d.getDate()}日</div>
                        <div class="text-[11px]">${weight}</div>
                    </div>`;
            }
        }

        function saveData() {
            db[selectedDate] = {
                w: document.getElementById('i-w').value,
                p: document.getElementById('i-p').value || 0,
                c: document.getElementById('i-c').value || 0,
                content: document.getElementById('i-content').value
            };
            localStorage.setItem('health_v3_db', JSON.stringify(db));
            updateUI();
            alert('✨ 數據已優雅儲存 ✨');
        }

        function toggleHistory() {
            const modal = document.getElementById('history-modal');
            const isVisible = modal.style.display === 'flex';
            modal.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) renderHistoryTable();
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = '';
            const sortedDates = Object.keys(db).sort().reverse();
            
            sortedDates.forEach((date) => {
                const current = db[date];
                const prev = db[getPrevDate(date)];
                let diffText = "";
                if (current.w && prev && prev.w) {
                    const diff = (parseFloat(current.w) - parseFloat(prev.w)).toFixed(1);
                    const color = diff > 0 ? 'text-red-300' : 'text-teal-400';
                    diffText = `<span class="${color} text-[10px] ml-1">(${diff > 0 ? '+' : ''}${diff})</span>`;
                }
                tbody.innerHTML += `
                    <tr>
                        <td class="py-5 text-gray-400 font-medium">${date.substring(5)}</td>
                        <td class="py-5">
                            <span class="font-bold text-gray-600 text-sm">${current.w || '--'}</span>${diffText}
                        </td>
                        <td class="py-5 text-gray-500 font-medium">
                            <span class="text-blue-300">${current.p}</span> / <span class="text-orange-300">${current.c}</span>
                        </td>
                    </tr>
                `;
            });
        }

        function getPrevDate(dateStr) {
            const d = new Date(dateStr);
            d.setDate(d.getDate() - 1);
            return d.toISOString().split('T')[0];
        }

        updateUI();
    </script>
</body>
</html>
