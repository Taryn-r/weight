<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>健康紀錄表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-start: #e0f7f8; --bg-end: #fffefe; }
        body { 
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: #444; font-family: "PingFang TC", sans-serif; 
            padding-bottom: 110px; min-height: 100vh; background-attachment: fixed;
        }
        .capsule-container { min-width: 62px; height: 115px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; cursor: pointer; }
        .capsule-bg { width: 44px; height: 78px; background: rgba(255,255,255,0.7); border-radius: 22px; position: relative; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); }
        .capsule-fill { position: absolute; bottom: 0; left: 0; right: 0; transition: height 0.5s ease; }
        .active-ring { border: 3px solid #ff9f43 !important; background: white; }
        .macaron-card { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 2.5rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-primary { background: linear-gradient(135deg, #a3e4d7 0%, #85c1e9 100%); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.5); color: #566573; border: 1px solid white; }
        .btn-danger { background: rgba(255, 182, 193, 0.4); color: #ff6b6b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; backdrop-filter: blur(8px); }
    </style>
</head>
<body>

    <header class="p-6 sticky top-0 z-50">
        <div class="flex justify-between items-center mb-6 max-w-md mx-auto relative z-10">
            <div onclick="document.getElementById('date-picker').showPicker()" class="cursor-pointer">
                <h1 id="display-title" class="text-2xl font-black mr-2 text-gray-700">今天</h1>
            </div>
            <div class="flex space-x-2">
                <button onclick="toggleChart()" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center text-blue-400 border border-white shadow-sm"><i class="fa-solid fa-chart-line"></i></button>
                <button onclick="toggleHistory()" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center text-teal-500 border border-white shadow-sm"><i class="fa-solid fa-list-ul"></i></button>
                <button onclick="toggleSettings()" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center text-gray-400 border border-white shadow-sm"><i class="fa-solid fa-gear"></i></button>
            </div>
        </div>
        <div id="date-slider" class="flex overflow-x-auto space-x-2 no-scrollbar max-w-md mx-auto py-2 relative z-10"></div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-6 relative z-10">
        <div class="macaron-card p-8 flex justify-around items-center">
            <div class="text-center">
                <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">Weight</p>
                <p id="v-w" class="text-4xl font-black text-teal-600">--</p>
            </div>
            <div class="text-center border-x border-gray-100/50 px-6">
                <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">Protein</p>
                <p id="v-p" class="text-4xl font-black text-blue-500">0</p>
            </div>
            <div class="text-center">
                <p class="text-[11px] font-bold text-gray-400 uppercase mb-2">Carb</p>
                <p id="v-c" class="text-4xl font-black text-orange-400">0</p>
            </div>
        </div>

        <div class="macaron-card p-8 space-y-6">
            <div class="grid grid-cols-3 gap-4">
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-teal-700">體重 (kg)</label>
                    <input id="i-w" type="number" step="0.1" class="w-full p-4 text-center bg-white/50 rounded-2xl outline-none font-black text-xl border border-white" placeholder="0.0">
                </div>
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-blue-600">蛋白 (g)</label>
                    <input id="i-p" type="number" class="w-full p-4 text-center bg-white/50 rounded-2xl outline-none font-black text-xl border border-white" placeholder="0">
                </div>
                <div class="text-center space-y-2">
                    <label class="text-xs font-bold text-orange-500">碳水 (g)</label>
                    <input id="i-c" type="number" class="w-full p-4 text-center bg-white/50 rounded-2xl outline-none font-black text-xl border border-white" placeholder="0">
                </div>
            </div>
            <textarea id="i-content" rows="2" class="w-full p-4 bg-white/50 rounded-2xl outline-none text-sm italic border border-white" placeholder="筆記..."></textarea>
            
            <div class="space-y-3 pt-2">
                <button onclick="saveData()" class="btn-primary w-full py-4 rounded-[1.5rem] font-bold text-lg shadow-lg active:scale-95 transition-all">儲存今日進度</button>
                <button onclick="deleteData()" class="btn-danger w-full py-3 rounded-[1.5rem] font-bold text-sm opacity-60">刪除此日紀錄</button>
            </div>
        </div>
    </main>

    <div id="history-modal" class="modal items-end justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-md rounded-[2.5rem] max-h-[85vh] overflow-hidden flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-white">
                <h3 class="font-black text-2xl text-teal-700">歷史數據</h3>
                <button onclick="toggleHistory()" class="text-3xl text-gray-300">&times;</button>
            </div>
            <div class="overflow-y-auto p-5 flex-1">
                <table class="w-full text-center">
                    <thead class="text-xs text-gray-400 border-b"><tr class="font-bold"><th class="py-4">日期</th><th class="py-4">體重</th><th class="py-4">差距</th><th class="py-4">P/C</th></tr></thead>
                    <tbody id="history-table-body" class="divide-y divide-gray-50/50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="chart-modal" class="modal items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl text-blue-600">最近趨勢</h3>
                <button onclick="toggleChart()" class="text-3xl text-gray-300">&times;</button>
            </div>
            <div class="h-64"><canvas id="weightChart"></canvas></div>
        </div>
    </div>

    <div id="settings-modal" class="modal items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur-lg w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl text-gray-700">資料備份功能</h3>
                <button onclick="toggleSettings()" class="text-3xl text-gray-300">&times;</button>
            </div>
            <div class="space-y-4">
                <button onclick="exportJSON()" class="w-full py-4 btn-secondary rounded-2xl font-bold flex items-center justify-center gap-3"><i class="fa-solid fa-file-code text-blue-400"></i> 匯出 JSON 備份檔</button>
                <button onclick="exportCSV()" class="w-full py-4 btn-secondary rounded-2xl font-bold flex items-center justify-center gap-3"><i class="fa-solid fa-file-csv text-teal-500"></i> 匯出 CSV 報表檔</button>
                <hr class="border-gray-100 my-2">
                <p class="text-[10px] text-gray-400 text-center font-bold uppercase">匯入還原</p>
                <button onclick="document.getElementById('importFile').click()" class="w-full py-4 bg-teal-50 text-teal-600 border border-teal-100 rounded-2xl font-bold flex items-center justify-center gap-3"><i class="fa-solid fa-file-import"></i> 選擇備份檔匯入</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importJSON(this)">
            </div>
        </div>
    </div>

    <input type="date" id="date-picker" class="hidden" onchange="setDate(this.value)">

    <script>
        let db = JSON.parse(localStorage.getItem('health_final_v3') || '{}');
        let selectedDate = new Date().toISOString().split('T')[0];
        let myChart = null;

        function setDate(date) { selectedDate = date; updateUI(); }

        function updateUI() {
            const todayStr = new Date().toISOString().split('T')[0];
            document.getElementById('display-title').innerText = (selectedDate === todayStr) ? "今天" : selectedDate.replace(/-/g, '/');
            renderDateSlider();
            const data = db[selectedDate] || { w: '', p: '', c: '', content: '' };
            document.getElementById('v-w').innerText = data.w || '--';
            document.getElementById('v-p').innerText = data.p || '0';
            document.getElementById('v-c').innerText = data.c || '0';
            document.getElementById('i-w').value = data.w || '';
            document.getElementById('i-p').value = data.p || '';
            document.getElementById('i-c').value = data.c || '';
            document.getElementById('i-content').value = data.content || '';
        }

        function renderDateSlider() {
            const slider = document.getElementById('date-slider');
            slider.innerHTML = '';
            for(let i = -3; i <= 3; i++) {
                let d = new Date(selectedDate); d.setDate(d.getDate() + i);
                let dateStr = d.toISOString().split('T')[0];
                let weight = db[dateStr]?.w || '';
                let isActive = dateStr === selectedDate ? 'active-ring' : '';
                let prevD = new Date(d); prevD.setDate(d.getDate() - 1);
                let prevW = db[prevD.toISOString().split('T')[0]]?.w;
                let fillColor = "bg-gray-100", symbol = "";
                if (weight && prevW) {
                    fillColor = parseFloat(weight) <= parseFloat(prevW) ? "bg-[#d1f2eb]" : "bg-[#fbeee0]";
                    symbol = parseFloat(weight) <= parseFloat(prevW) ? "-" : "↑";
                } else if (weight) { fillColor = "bg-[#d1f2eb]"; }
                slider.innerHTML += `
                    <div onclick="setDate('${dateStr}')" class="capsule-container">
                        <div class="text-[10px] text-gray-400 mb-1.5 font-bold">${weight}</div>
                        <div class="capsule-bg ${isActive}"><div class="capsule-fill ${fillColor} flex items-center justify-center text-[10px] font-bold text-white" style="height: ${weight ? '65%' : '0%'}">${symbol}</div></div>
                        <div class="text-sm mt-2.5 font-black ${dateStr === selectedDate ? 'text-orange-500' : 'text-gray-400'}">${d.getDate()}</div>
                    </div>`;
            }
        }

        function saveData() {
            db[selectedDate] = { w: document.getElementById('i-w').value, p: document.getElementById('i-p').value || 0, c: document.getElementById('i-c').value || 0, content: document.getElementById('i-content').value };
            localStorage.setItem('health_final_v3', JSON.stringify(db));
            updateUI(); alert('✨ 儲存成功 ✨');
        }

        function deleteData() {
            if(confirm('確定刪除這天的紀錄？')) { delete db[selectedDate]; localStorage.setItem('health_final_v3', JSON.stringify(db)); updateUI(); }
        }

        // --- 備份邏輯 ---
        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `health_backup_${selectedDate}.json`);
            downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        function exportCSV() {
            let csvContent = "日期,體重,蛋白質,碳水,內容\n";
            Object.keys(db).sort().forEach(date => {
                const item = db[date];
                csvContent += `${date},${item.w},${item.p},${item.c},${item.content}\n`;
            });
            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "健康紀錄報表.csv");
            link.click();
        }

        function importJSON(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    db = { ...db, ...importedData }; // 合併資料
                    localStorage.setItem('health_final_v3', JSON.stringify(db));
                    updateUI(); alert('✅ 資料匯入合併成功！');
                    toggleSettings();
                } catch (err) { alert('❌ 檔案格式錯誤，請選取正確的 JSON 檔。'); }
            };
            reader.readAsText(file);
        }

        // --- UI 控制 ---
        function toggleHistory() { document.getElementById('history-modal').style.display = (document.getElementById('history-modal').style.display === 'flex') ? 'none' : 'flex'; renderHistoryTable(); }
        function toggleChart() { document.getElementById('chart-modal').style.display = (document.getElementById('chart-modal').style.display === 'flex') ? 'none' : 'flex'; renderChart(); }
        function toggleSettings() { document.getElementById('settings-modal').style.display = (document.getElementById('settings-modal').style.display === 'flex') ? 'none' : 'flex'; }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-table-body'); tbody.innerHTML = '';
            Object.keys(db).sort().reverse().forEach(date => {
                const cur = db[date];
                tbody.innerHTML += `<tr><td class="py-5 text-gray-400 text-xs">${date.substring(5)}</td><td class="py-5 font-black text-xl">${cur.w}</td><td class="py-5 font-bold text-sm">--</td><td class="py-5 font-bold text-blue-400">${cur.p}/${cur.c}</td></tr>`;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            const dates = Object.keys(db).sort().slice(-7);
            const weights = dates.map(d => db[d].w);
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: { labels: dates.map(d => d.substring(5)), datasets: [{ data: weights, borderColor: '#85c1e9', fill: true, tension: 0.4 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        updateUI();
    </script>
</body>
</html>
